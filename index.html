<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>⚽ SuperFantaMondiale 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:.5px solid #e0e0d8;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge-pill{font-size:11px;background:#1D9E75;color:#fff;border-radius:20px;padding:2px 9px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.tabs{display:flex;border-bottom:.5px solid #e0e0d8;background:#fff;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:58px;padding:10px 2px 9px;font-size:11px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}
.content{flex:1;padding:12px 12px 100px}
.card{background:#fff;border-radius:12px;border:.5px solid #e0e0d8;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-card{background:#f8f8f4;border-radius:10px;border:.5px solid #e0e0d8;padding:10px 12px;cursor:pointer;transition:all .15s}
.team-card:active{transform:scale(.97)}
.team-card.selected{border:1.5px solid #1D9E75;background:#E1F5EE}
.team-card.mine{border:1.5px solid #1D9E75}
.team-name{font-size:13px;font-weight:600}
.team-manager{font-size:11px;color:#888;margin-top:2px}
.team-count{font-size:11px;color:#1D9E75;margin-top:4px;font-weight:500}
.role-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.role-btn{padding:6px 12px;border-radius:20px;font-size:12px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.role-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.player-item:last-child{border-bottom:none}
.role-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:28px;text-align:center}
.role-P{background:#E6F1FB;color:#185FA5}
.role-D{background:#EAF3DE;color:#3B6D11}
.role-C{background:#FAEEDA;color:#854F0B}
.role-A{background:#FCEBEB;color:#A32D2D}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-nation{font-size:11px;color:#888}
.checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.checkbox.disabled{opacity:.35;cursor:not-allowed}
.quota-row{display:flex;gap:8px;margin-bottom:12px}
.quota-box{flex:1;background:#f8f8f4;border-radius:8px;padding:8px 4px;text-align:center}
.quota-num{font-size:18px;font-weight:600}
.quota-label{font-size:9px;color:#888;margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.quota-ok{color:#1D9E75}.quota-warn{color:#BA7517}.quota-over{color:#A32D2D}
.field{background:linear-gradient(180deg,#1a6b34 0%,#1a5c2e 100%);border-radius:12px;padding:16px 8px;min-height:300px}
.field-row{display:flex;justify-content:center;gap:4px;margin-bottom:12px}
.player-slot{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:7px 3px;text-align:center;min-width:54px;max-width:70px;flex:1;cursor:pointer;transition:background .15s}
.player-slot:active{background:rgba(255,255,255,.25)}
.player-slot.filled{background:rgba(255,255,255,.2)}
.player-slot.eliminated{opacity:.4;background:rgba(200,40,40,.35)}
.slot-name{font-size:9.5px;color:#fff;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-nation{font-size:8px;color:rgba(255,255,255,.65);margin-top:1px}
.slot-vote{font-size:11px;color:#7adfb0;font-weight:700;margin-top:2px}
.slot-empty{font-size:9px;color:rgba(255,255,255,.4);padding:4px 0}
.module-selector{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mod-btn{padding:5px 11px;font-size:12px;border-radius:20px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.mod-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.classifica-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.classifica-row:last-child{border-bottom:none}
.pos-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#f0f0e8;color:#888;flex-shrink:0}
.pos-badge.gold{background:#FAEEDA;color:#854F0B}
.pos-badge.silver{background:#f0f0f0;color:#555}
.pos-badge.bronze{background:#fde8d8;color:#854F0B}
.team-pts{font-size:16px;font-weight:700;color:#1D9E75;margin-left:auto}
.btn-primary{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btn-primary:active{opacity:.8}
.btn-secondary{background:transparent;color:#1a1a1a;border:.5px solid #ccc;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:500}
.input-field{width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;margin-bottom:8px;outline:none}
.input-field:focus{border-color:#1D9E75}
.vote-input{width:65px;padding:6px 8px;border-radius:6px;border:.5px solid #ccc;background:#f8f8f4;color:#1a1a1a;font-size:14px;text-align:center;outline:none}
.vote-input:focus{border-color:#1D9E75}
.eliminated-badge{font-size:9px;background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
.section-label{font-size:11px;color:#888;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.giornata-selector{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.giornata-selector span{font-size:15px;font-weight:600;flex:1;text-align:center}
.gsel-btn{background:#f0f0e8;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#1a1a1a}
.search-box{width:100%;padding:9px 14px;border-radius:10px;border:.5px solid #e0e0d8;background:#f8f8f4;color:#1a1a1a;font-size:14px;margin-bottom:10px;outline:none}
.search-box:focus{border-color:#1D9E75;background:#fff}
.score-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:.5px solid #e0e0d8}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:75vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{font-size:22px;cursor:pointer;color:#888;padding:4px}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0d8;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.rosa-view{background:#f8f8f4;border-radius:8px;padding:10px;margin-bottom:8px}
.rosa-view-name{font-size:13px;font-weight:600;margin-bottom:6px}
.rosa-players{display:flex;flex-wrap:wrap;gap:4px}
.rosa-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff;border:.5px solid #e0e0d8}
.rosa-pill.P{border-color:#185FA5;color:#185FA5}
.rosa-pill.D{border-color:#3B6D11;color:#3B6D11}
.rosa-pill.C{border-color:#854F0B;color:#854F0B}
.rosa-pill.A{border-color:#A32D2D;color:#A32D2D}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.sync-ok{background:#E1F5EE;color:#0F6E56}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-loading{background:#f0f0e8;color:#888}
@media(prefers-color-scheme:dark){

  .team-card{background:#333;border-color:#444}

  .search-box,.input-field{background:#333;border-color:#444;color:#f0f0f0}
  .vote-input,.quota-box,.rosa-view{background:#333}
  .gsel-btn{background:#333;color:#f0f0f0}
  .mod-btn,.role-btn,.btn-secondary{color:#f0f0f0;border-color:#444}
  .player-item{border-color:#3a3a3a}
  .classifica-row{border-color:#3a3a3a}
  .score-total{border-color:#3a3a3a}
  .rosa-pill{background:#444;border-color:#555}

    {n:"Al-Owais",r:"P"},{n:"Al-Rubaie",r:"P"},{n:"Al-Subaihi",r:"P"},
    {n:"Al-Ghannam",r:"D"},{n:"Al-Bulaihi",r:"D"},{n:"Tambakti",r:"D"},{n:"Al-Shahrani",r:"D"},{n:"Al-Hamdan",r:"D"},{n:"Al-Khaibari",r:"D"},
    {n:"S. Al-Dawsari",r:"C"},{n:"M. Kanno",r:"C"},{n:"A. Al-Hassan",r:"C"},{n:"Feras",r:"C"},{n:"N. Al-Dawsari",r:"C"},{n:"Al-Qahtani",r:"C"},
    {n:"Al-Shehri",r:"A"},{n:"Al-Aboud",r:"A"},{n:"Al-Buraikan",r:"A"},{n:"H. Asiri",r:"A"},{n:"Alhajri",r:"A"},{n:"Albrikan",r:"A"}]},
];

const QUOTA={P:4,D:14,C:14,A:12};
const MODULI=["4-3-3","4-4-2","3-5-2","3-4-3","4-5-1","5-3-2"];

// ============================================================
// STATO LOCALE (solo myTeamId e giornata attiva)
// ============================================================
let local = JSON.parse(localStorage.getItem('sfm26_local')||'{}');
local.myTeamId = local.myTeamId ?? null;
local.giornata = local.giornata ?? 1;
local.modulo = local.modulo ?? '4-3-3';
local._draftRole = local._draftRole ?? 'P';
local._draftSearch = local._draftSearch ?? '';
function saveLocal(){localStorage.setItem('sfm26_local',JSON.stringify(local));}

// Stato da Supabase
let teams = [];
let eliminatedNations = [];
let voti = {};

function getMyTeam(){return teams.find(t=>t.id===local.myTeamId);}
function rosaCount(rosa,r){return (rosa||[]).filter(p=>p.r===r).length;}
function isEliminated(naz){return eliminatedNations.includes(naz);}
function getFlag(naz){return SQUADRE_MONDIALI.find(s=>s.naz===naz)?.flag||'';}

// ============================================================
// SUPABASE HELPERS
// ============================================================
async function loadAll(){
  const [teamsData, elimData, votiData] = await Promise.all([
    sbSelect('squadre_fm','&order=id.asc'),
    sbSelect('nazioni_eliminate_fm'),
    sbSelect('voti_fm')
  ]);
  teams = Array.isArray(teamsData) ? teamsData.map(t=>({
    ...t,
    rosa: t.rosa||[],
    puntiGiornate: t.puntiGiornate||[],
    puntiTotali: t.puntiTotali||0
  })) : [];
  eliminatedNations = Array.isArray(elimData) ? elimData.map(r=>r.naz) : [];
  voti = {};
  if(Array.isArray(votiData)){
    votiData.forEach(row=>{
      if(!voti[row.giornata]) voti[row.giornata]={};
      voti[row.giornata][row.player_key]=row.voto;
    });
  }
}

async function saveTeam(team){
  return sbUpsert('squadre_fm',[{
    id:team.id, name:team.name, manager:team.manager,
    rosa:team.rosa, puntiTotali:team.puntiTotali, puntiGiornate:team.puntiGiornate,
    updated_at:new Date().toISOString()
  }]);
}

async function saveFormazione(teamId, giornata, modulo, formazione){
  return sbUpsert('formazioni_fm',[{team_id:teamId, giornata, modulo, formazione}]);
}

async function loadFormazione(teamId, giornata){
  const r = await sbSelect('formazioni_fm',`&team_id=eq.${teamId}&giornata=eq.${giornata}`);
  return Array.isArray(r)&&r.length>0 ? r[0] : null;
}

async function saveVoti(giornata, votiGiornata){
  const rows = Object.entries(votiGiornata).map(([player_key,voto])=>({giornata,player_key,voto}));
  if(rows.length) return sbUpsert('voti_fm', rows);
}

async function syncEliminate(){
  await fetch(`${SB_URL}/rest/v1/nazioni_eliminate_fm?naz=like.*`, {method:'DELETE', headers:HDR});
  if(eliminatedNations.length>0)
    await sbUpsert('nazioni_eliminate_fm', eliminatedNations.map(naz=>({naz})));
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const tab = document.querySelector('.tab.active')?.dataset.tab||'squadre';
  const mt = getMyTeam();
  document.getElementById('topbar-sub').textContent = mt ? `${mt.name} — ${mt.manager}` : 'Seleziona la tua squadra ↓';
  renderTab(tab);
}

function renderTab(tab){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      renderTab(t.dataset.tab);
    };
  });
  const el=document.getElementById('content');
  const handlers = {
    squadre: renderSquadre,
    draft: renderDraft,
    formazione: ()=>renderFormazione(),
    voti: renderVoti,
    'rose-altrui': renderRoseAltrui,
    classifica: renderClassifica
  };
  if(handlers[tab]) el.innerHTML = handlers[tab]();
  else el.innerHTML = '';
  attachEvents(tab);
}

function renderSquadre(){
  let html=`<div class="card"><div class="card-title">Scegli la tua squadra</div><div class="team-grid">`;
  teams.forEach(t=>{
    const isMine=t.id===local.myTeamId;
    html+=`<div class="team-card ${isMine?'selected mine':''}" data-tid="${t.id}">
      <div class="team-name">${isMine?'👑 ':''}${t.name}</div>
      <div class="team-manager">${t.manager}</div>
      <div class="team-count">${(t.rosa||[]).length}/44 ✓</div>
    </div>`;
  });
  html+=`</div></div>`;
  if(local.myTeamId!==null){
    const mt=getMyTeam();
    html+=`<div class="card"><div class="card-title">Modifica la tua squadra</div>
      <input class="input-field" id="edit-name" value="${mt.name}" placeholder="Nome squadra">
      <input class="input-field" id="edit-manager" value="${mt.manager}" placeholder="Il tuo nome">
      <button class="btn-primary" id="save-team-btn">💾 Salva nome</button></div>`;
  }
  html+=`<div class="card"><div class="card-title">🚫 Nazioni eliminate (${eliminatedNations.length})</div>
    <div style="font-size:12px;color:#888;margin-bottom:10px">Tocca per eliminare — visibile a tutti</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  SQUADRE_MONDIALI.forEach(s=>{
    const e=isEliminated(s.naz);
    html+=`<span data-elim="${s.naz}" style="cursor:pointer;font-size:12px;padding:3px 9px;border-radius:20px;border:1px solid ${e?'#A32D2D':'#e0e0d8'};background:${e?'#FCEBEB':'transparent'};color:${e?'#A32D2D':'inherit'};user-select:none">${s.flag} ${s.naz}</span>`;
  });
  html+=`</div></div>`;
  return html;
}

function renderDraft(){
  if(local.myTeamId===null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra nel tab Squadre</div>`;
  const mt=getMyTeam(), rosa=mt.rosa||[];
  const roles=['P','D','C','A'], rn={P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
  const ar=local._draftRole, sr=local._draftSearch;
  let html=`<div class="card"><div class="quota-row">`;
  roles.forEach(r=>{
    const c=rosaCount(rosa,r),m=QUOTA[r];
    const cls=c===m?'quota-ok':c>m?'quota-over':'quota-warn';
    html+=`<div class="quota-box"><div class="quota-num ${cls}">${c}/${m}</div><div class="quota-label">${rn[r]}</div></div>`;
  });
  html+=`</div></div><div class="card"><div class="card-title">Scegli i tuoi giocatori</div><div class="role-tabs">`;
  roles.forEach(r=>html+=`<button class="role-btn ${ar===r?'active':''}" data-drole="${r}">${rn[r]} ${rosaCount(rosa,r)}/${QUOTA[r]}</button>`);
  html+=`</div><input class="search-box" id="draft-search" placeholder="🔍 Cerca giocatore o nazione..." value="${sr}">`;
  let players=[];
  SQUADRE_MONDIALI.forEach(s=>s.g.filter(p=>p.r===ar).forEach(p=>players.push({...p,naz:s.naz,flag:s.flag})));
  if(sr) players=players.filter(p=>p.n.toLowerCase().includes(sr.toLowerCase())||p.naz.toLowerCase().includes(sr.toLowerCase()));
  players.sort((a,b)=>a.n.localeCompare(b.n));
  const canAdd=rosaCount(rosa,ar)<QUOTA[ar];
  players.forEach(p=>{
    const has=rosa.some(r=>r.n===p.n&&r.naz===p.naz);
    const elim=isEliminated(p.naz);
    html+=`<div class="player-item">
      <div class="checkbox ${has?'checked':!canAdd&&!has?'disabled':''}" data-addp="${p.n}" data-addnaz="${p.naz}" data-addr="${p.r}">${has?'✓':''}</div>
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info">
        <div class="player-name">${p.n}</div>
        <div class="player-nation">${p.flag} ${p.naz}${elim?'<span class="eliminated-badge">ELIM</span>':''}</div>
      </div></div>`;
  });
  return html+'</div>';
}

let _currentForm = {};

async function renderFormazione(){
  if(local.myTeamId===null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra</div>`;
  const mt=getMyTeam(), gk=local.giornata;
  const saved = await loadFormazione(local.myTeamId, gk);
  const mod = saved?.modulo || local.modulo;
  const form = saved?.formazione || {};
  _currentForm = form;
  const parts=mod.split('-').map(Number),nD=parts[0],nC=parts[1],nA=parts[2];
  const votiG=voti[gk]||{};
  const getV=p=>p?(votiG[p.n+'_'+p.naz]??null):null;
  const slotP=form.P||null;
  const slotsD=(form.D||[]).slice(0,nD).concat(Array(Math.max(0,nD-(form.D||[]).length)).fill(null));
  const slotsC=(form.C||[]).slice(0,nC).concat(Array(Math.max(0,nC-(form.C||[]).length)).fill(null));
  const slotsA=(form.A||[]).slice(0,nA).concat(Array(Math.max(0,nA-(form.A||[]).length)).fill(null));
  const mkSlot=(p,idx,r)=>{
    const v=getV(p),elim=p&&isEliminated(p.naz);
    return `<div class="player-slot ${p?'filled':''} ${elim?'eliminated':''}" data-fslot="${r}" data-idx="${idx}">
      ${p?`<div class="slot-name">${p.n.split(' ').pop()}</div><div class="slot-nation">${p.flag||getFlag(p.naz)}</div><div class="slot-vote">${v!==null?v:'?'}</div>`:`<div class="slot-empty">+${r}</div>`}
    </div>`;
  };
  let tot=0;
  [slotP,...slotsD,...slotsC,...slotsA].forEach(p=>{if(p&&!isEliminated(p.naz)){const v=getV(p);if(v!==null)tot+=parseFloat(v);}});
  let html=`<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="gk-prev">◀</button><span>Giornata ${gk}</span><button class="gsel-btn" id="gk-next">▶</button></div>
    <div class="module-selector">`;
  MODULI.forEach(m=>html+=`<button class="mod-btn ${mod===m?'active':''}" data-mod="${m}">${m}</button>`);
  html+=`</div><div style="font-size:11px;color:#888;margin-bottom:8px">Tocca uno slot per assegnare un giocatore</div>
    <div class="field">
      <div class="field-row">${mkSlot(slotP,0,'P')}</div>
      <div class="field-row">${slotsD.map((p,i)=>mkSlot(p,i,'D')).join('')}</div>
      <div class="field-row">${slotsC.map((p,i)=>mkSlot(p,i,'C')).join('')}</div>
      <div class="field-row">${slotsA.map((p,i)=>mkSlot(p,i,'A')).join('')}</div>
    </div>
    <div class="score-total"><span style="font-size:13px;color:#888">Punteggio G${gk}</span><span style="font-size:20px;font-weight:700;color:#1D9E75">${tot.toFixed(1)} pt</span></div>
  </div>`;
  return html;
}

function renderRoseAltrui(){
  let html=`<div class="card"><div class="card-title">Rose di tutte le squadre</div>`;
  const roles=['P','D','C','A'];
  teams.forEach(t=>{
    const rosa=t.rosa||[];
    if(!rosa.length){
      html+=`<div class="rosa-view"><div class="rosa-view-name">${t.id===local.myTeamId?'👑 ':''}${t.name} <span style="font-size:11px;color:#888">(${t.manager})</span></div><div style="font-size:12px;color:#ccc">Rosa non ancora compilata</div></div>`;
      return;
    }
    html+=`<div class="rosa-view"><div class="rosa-view-name">${t.id===local.myTeamId?'👑 ':''}${t.name} <span style="font-size:11px;color:#888">(${t.manager}) · ${rosa.length}/44</span></div><div class="rosa-players">`;
    roles.forEach(r=>{
      rosa.filter(p=>p.r===r).forEach(p=>{
        const elim=isEliminated(p.naz);
        html+=`<span class="rosa-pill ${r}" style="${elim?'opacity:.4;text-decoration:line-through':''}">${p.flag||getFlag(p.naz)} ${p.n}</span>`;
      });
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  return html;
}

function renderVoti(){
  const gk=local.giornata, votiG=voti[gk]||{};
  let html=`<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="gk-prev2">◀</button><span>Voti Giornata ${gk}</span><button class="gsel-btn" id="gk-next2">▶</button></div>
    <div style="font-size:12px;color:#1D9E75;margin-bottom:10px">🌐 I voti salvati sono visibili a tutti i manager in tempo reale</div>`;
  SQUADRE_MONDIALI.forEach(s=>{
    html+=`<div class="section-label">${s.flag} ${s.naz}</div>`;
    s.g.forEach(p=>{
      const key=p.n+'_'+s.naz, val=votiG[key]!==undefined?votiG[key]:'';
      html+=`<div class="player-item">
        <span class="role-badge role-${p.r}">${p.r}</span>
        <div class="player-info"><div class="player-name">${p.n}</div></div>
        <input class="vote-input" data-vkey="${key}" value="${val}" placeholder="6" type="number" step=".5" min="0" max="10">
      </div>`;
    });
  });
  html+=`<button class="btn-primary" id="save-voti-btn">✅ Salva voti e calcola punteggi</button></div>`;
  return html;
}

function renderClassifica(){
  const sorted=[...teams].sort((a,b)=>b.puntiTotali-a.puntiTotali);
  let html=`<div class="card"><div class="card-title">🏆 Classifica generale</div>`;
  sorted.forEach((t,i)=>{
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    html+=`<div class="classifica-row">
      <div class="pos-badge ${pc}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${t.id===local.myTeamId?'👑 ':''}${t.name}</div><div style="font-size:11px;color:#888">${t.manager} · ${(t.rosa||[]).length} giocatori</div></div>
      <div style="text-align:right"><div class="team-pts">${(t.puntiTotali||0).toFixed(1)}</div><div style="font-size:10px;color:#888">punti</div></div>
    </div>`;
  });
  html+=`</div>`;
  if(local.giornata>1){
    html+=`<div class="card"><div class="card-title">Andamento giornate</div>`;
    teams.forEach(t=>{
      html+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:#888"><span>${t.name}</span><span style="font-weight:600;color:#1D9E75">${(t.puntiTotali||0).toFixed(1)} tot</span></div><div style="display:flex;gap:3px">`;
      for(let g=1;g<local.giornata;g++){
        const pts=(t.puntiGiornate||[])[g-1]||0;
        html+=`<div style="flex:1;height:28px;border-radius:5px;background:${pts>0?'#E1F5EE':'#f0f0e8'};border:.5px solid ${pts>0?'#1D9E75':'#e0e0d8'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:${pts>0?'#1D9E75':'#ccc'}">${pts>0?pts.toFixed(0):'G'+g}</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }
  return html;
}

// ============================================================
// SLOT PICKER
// ============================================================
function openSlotPicker(r,idx){
  const mt=getMyTeam(), avail=(mt.rosa||[]).filter(p=>p.r===r);
  const rN={P:'Portiere',D:'Difensore',C:'Centrocampista',A:'Attaccante'};
  let inner=`<div class="modal-overlay" id="modal-overlay"><div class="modal-sheet">
    <div class="modal-header"><span class="modal-title">Scegli ${rN[r]}</span><span class="modal-close" id="close-modal">✕</span></div>`;
  if(!avail.length) inner+=`<div style="color:#888;text-align:center;padding:20px">Nessun ${r} in rosa</div>`;
  avail.forEach(p=>{
    const elim=isEliminated(p.naz);
    const pd=encodeURIComponent(JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag}));
    inner+=`<div class="player-item">
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info"><div class="player-name" style="${elim?'opacity:.4':''}">${p.n}</div><div class="player-nation">${p.flag||getFlag(p.naz)} ${p.naz}${elim?'<span class="eliminated-badge">ELIM</span>':''}</div></div>
      ${!elim?`<button class="btn-secondary" style="font-size:12px;padding:5px 10px;white-space:nowrap" data-pickp="${pd}" data-pickr="${r}" data-pickidx="${idx}">Scegli</button>`:'<span style="font-size:11px;color:#A32D2D">n.d.</span>'}
    </div>`;
  });
  inner+=`</div></div>`;
  const div=document.createElement('div'); div.id='modal-container'; div.innerHTML=inner;
  document.body.appendChild(div);
  div.querySelector('#close-modal').onclick=()=>div.remove();
  div.querySelector('#modal-overlay').onclick=e=>{if(e.target.id==='modal-overlay')div.remove();};
  div.querySelectorAll('[data-pickp]').forEach(btn=>{
    btn.onclick=async()=>{
      const p=JSON.parse(decodeURIComponent(btn.dataset.pickp)), ri=btn.dataset.pickr, i=parseInt(btn.dataset.pickidx);
      const mod=local.modulo, np=mod.split('-').map(Number);
      const ns=ri==='D'?np[0]:ri==='C'?np[1]:np[2];
      if(!_currentForm[ri]&&ri!=='P'){_currentForm[ri]=Array(ns).fill(null);}
      if(ri==='P') _currentForm.P=p;
      else{
        const arr=(_currentForm[ri]||[]).slice(0,ns);
        while(arr.length<ns) arr.push(null);
        arr[i]=p; _currentForm[ri]=arr;
      }
      await saveFormazione(local.myTeamId, local.giornata, local.modulo, _currentForm);
      div.remove();
      document.getElementById('content').innerHTML = await renderFormazione();
      attachEvents('formazione');
    };
  });
}

// ============================================================
// EVENTS
// ============================================================
function attachEvents(tab){
  if(tab==='squadre'){
    document.querySelectorAll('.team-card').forEach(el=>el.addEventListener('click',async()=>{
      local.myTeamId=parseInt(el.dataset.tid); saveLocal();
      document.getElementById('topbar-sub').textContent=`${getMyTeam()?.name} — ${getMyTeam()?.manager}`;
      renderTab('squadre');
    }));
    document.getElementById('save-team-btn')?.addEventListener('click',async()=>{
      const btn=document.getElementById('save-team-btn');
      btn.textContent='⏳ Salvataggio...'; btn.disabled=true;
      const mt=getMyTeam();
      mt.name=document.getElementById('edit-name').value||mt.name;
      mt.manager=document.getElementById('edit-manager').value||mt.manager;
      const ok=await saveTeam(mt);
      if(ok){ await loadAll(); render(); }
      else { btn.textContent='❌ Errore — riprova'; btn.disabled=false; }
    });
    document.querySelectorAll('[data-elim]').forEach(el=>el.addEventListener('click',async()=>{
      const naz=el.dataset.elim, idx=eliminatedNations.indexOf(naz);
      if(idx>-1) eliminatedNations.splice(idx,1); else eliminatedNations.push(naz);
      await syncEliminate();
      renderTab('squadre');
    }));
  }
  if(tab==='draft'){
    document.querySelectorAll('[data-drole]').forEach(el=>el.addEventListener('click',()=>{local._draftRole=el.dataset.drole;local._draftSearch='';saveLocal();renderTab('draft');}));
    document.getElementById('draft-search')?.addEventListener('input',e=>{local._draftSearch=e.target.value;saveLocal();renderTab('draft');});
    document.querySelectorAll('[data-addp]').forEach(el=>el.addEventListener('click',async()=>{
      if(el.classList.contains('disabled')) return;
      el.style.opacity='0.4'; el.style.pointerEvents='none';
      const mt=getMyTeam(), rosa=mt.rosa||[];
      const pn=el.dataset.addp, naz=el.dataset.addnaz, r=el.dataset.addr;
      const idx=rosa.findIndex(p=>p.n===pn&&p.naz===naz);
      const squad=SQUADRE_MONDIALI.find(s=>s.naz===naz);
      if(idx>-1) rosa.splice(idx,1);
      else if(rosaCount(rosa,r)<QUOTA[r]) rosa.push({n:pn,naz,r,flag:squad?.flag});
      mt.rosa=rosa;
      const ok=await saveTeam(mt);
      if(ok){ renderTab('draft'); }
      else { el.style.opacity=''; el.style.pointerEvents=''; alert('Errore salvataggio — controlla la connessione'); }
    }));
  }
  if(tab==='formazione'){
    document.getElementById('gk-prev')?.addEventListener('click',async()=>{if(local.giornata>1){local.giornata--;saveLocal();document.getElementById('content').innerHTML=await renderFormazione();attachEvents('formazione');}});
    document.getElementById('gk-next')?.addEventListener('click',async()=>{local.giornata++;saveLocal();document.getElementById('content').innerHTML=await renderFormazione();attachEvents('formazione');});
    document.querySelectorAll('[data-mod]').forEach(el=>el.addEventListener('click',async()=>{local.modulo=el.dataset.mod;saveLocal();document.getElementById('content').innerHTML=await renderFormazione();attachEvents('formazione');}));
    document.querySelectorAll('[data-fslot]').forEach(el=>el.addEventListener('click',()=>openSlotPicker(el.dataset.fslot,parseInt(el.dataset.idx))));
  }
  if(tab==='voti'){
    document.getElementById('gk-prev2')?.addEventListener('click',async()=>{if(local.giornata>1){local.giornata--;saveLocal();await loadAll();renderTab('voti');}});
    document.getElementById('gk-next2')?.addEventListener('click',async()=>{local.giornata++;saveLocal();await loadAll();renderTab('voti');});
    document.getElementById('save-voti-btn')?.addEventListener('click',async()=>{
      const gk=local.giornata;
      if(!voti[gk]) voti[gk]={};
      document.querySelectorAll('[data-vkey]').forEach(inp=>{
        const v=parseFloat(inp.value);
        if(!isNaN(v)) voti[gk][inp.dataset.vkey]=v;
        else if(inp.value==='') delete voti[gk][inp.dataset.vkey];
      });
      await saveVoti(gk, voti[gk]);
      // Calcola punteggi per ogni team
      for(const t of teams){
        const fData=await loadFormazione(t.id, gk);
        if(!fData) continue;
        const mod=fData.modulo||'4-3-3', form=fData.formazione||{};
        const np=mod.split('-').map(Number);
        const sD=(form.D||[]).slice(0,np[0]),sC=(form.C||[]).slice(0,np[1]),sA=(form.A||[]).slice(0,np[2]);
        let tot=0;
        [form.P,...sD,...sC,...sA].forEach(p=>{if(p&&!isEliminated(p.naz)){const v=voti[gk]?.[p.n+'_'+p.naz];if(v!==undefined)tot+=parseFloat(v);}});
        if(!t.puntiGiornate) t.puntiGiornate=[];
        t.puntiGiornate[gk-1]=Math.round(tot*10)/10;
        t.puntiTotali=Math.round(t.puntiGiornate.reduce((a,b)=>a+(b||0),0)*10)/10;
        await saveTeam(t);
      }
      alert(`✅ Voti G${gk} salvati! Punteggi aggiornati per tutte le squadre.`);
      renderTab('voti');
    });
  }
  if(tab==='rose-altrui'){
    document.getElementById('refresh-rose')?.addEventListener('click',async()=>{
      await loadAll(); renderTab('rose-altrui');
    });
  }
}

(async()=>{
  try{
    await loadAll();
    render();
  } catch(e){
    document.getElementById('content').innerHTML=`<div style="padding:20px;text-align:center;color:#A32D2D">Errore connessione Supabase.<br>Controlla la connessione internet e ricarica.</div>`;
  }
})();
</script>
