// Stato da Supabase

let eliminated = [];
let voti = {};

const rCount = (rosa, r) => (rosa||[]).filter(p => p.r === r).length;
const isElim = naz => eliminated.includes(naz);
const flag = naz => NAZ.find(s => s.naz === naz)?.flag || '';

// ============================================================
// LOAD FROM SUPABASE
// ============================================================
async function loadAll() {
  const [t, e, v, f] = await Promise.all([
    GET('squadre_fm', '&order=id.asc'),
    GET('nazioni_eliminate_fm'),
    GET('voti_fm'),
    GET('formazioni_fm')
  ]);
  teams = (t||[]).map(x => ({...x, rosa: x.rosa||[], puntiGiornate: x.puntiGiornate||[], puntiTotali: x.puntiTotali||0}));
  eliminated = (e||[]).map(r => r.naz);
  voti = {};
  (v||[]).forEach(r => { if(!voti[r.giornata]) voti[r.giornata]={}; voti[r.giornata][r.player_key]=r.voto; });
  formations = {};
  (f||[]).forEach(r => { formations[r.team_id+'_'+r.giornata] = r; });
}

// ============================================================
// SAVE HELPERS
// ============================================================
async function saveTeam(team) {
  return UPSERT('squadre_fm', [{
    id: team.id, name: team.name, manager: team.manager,
    rosa: team.rosa, puntiTotali: team.puntiTotali,
    puntiGiornate: team.puntiGiornate, updated_at: new Date().toISOString()
  }]);
}

async function saveFormation(teamId, giornata, modulo, formazione) {
  return UPSERT('formazioni_fm', [{team_id: teamId, giornata, modulo, formazione}]);
}

async function saveVoti(giornata, votiObj) {
  const rows = Object.entries(votiObj).map(([k,v]) => ({giornata, player_key:k, voto:v}));
  if (rows.length) return UPSERT('voti_fm', rows);
}

async function saveEliminated() {
  // Delete all with naz >= '' then re-insert
  try { await DELETE_ALL('nazioni_eliminate_fm', 'naz', ''); } catch(e) {}
  if (eliminated.length > 0) await UPSERT('nazioni_eliminate_fm', eliminated.map(naz => ({naz})));
}

let activeTab = 'squadre';

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  paint();
}

function paint() {
  const mt = myTeam();
  document.getElementById('topbar-sub').textContent = mt ? `${mt.name} — ${mt.manager}` : 'Seleziona la tua squadra ↓';
  const el = document.getElementById('content');
  const fns = { squadre: pgSquadre, draft: pgDraft, formazione: pgFormazione, voti: pgVoti, rose: pgRose, classifica: pgClassifica };
  el.innerHTML = fns[activeTab] ? fns[activeTab]() : '';
  bindEvents();
}

// ---- SQUADRE ----
function pgSquadre() {
  let h = `<div class="card"><div class="card-title">Scegli la tua squadra</div><div class="team-grid">`;
  teams.forEach(t => {
    const mine = t.id === L.myId;
    h += `<div class="team-card ${mine?'selected':''}" data-tid="${t.id}">
      <div class="team-name">${mine?'👑 ':''}${t.name}</div>
      <div class="team-manager">${t.manager}</div>
      <div class="team-count">${(t.rosa||[]).length}/44</div>
    </div>`;
  });
  h += `</div></div>`;
  if (L.myId !== null) {
    const mt = myTeam();
    h += `<div class="card"><div class="card-title">Modifica la tua squadra</div>
      <input class="input-field" id="inp-name" value="${mt.name}" placeholder="Nome squadra">
      <input class="input-field" id="inp-mgr" value="${mt.manager}" placeholder="Il tuo nome">
      <button class="btn-primary" id="btn-save-team">💾 Salva</button></div>`;
  }
  h += `<div class="card"><div class="card-title">🚫 Nazioni eliminate</div>
    <div style="font-size:12px;color:#888;margin-bottom:10px">Tocca per segnare come eliminata</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  NAZ.forEach(s => {
    const e = isElim(s.naz);
    h += `<span data-elim="${s.naz}" style="cursor:pointer;font-size:12px;padding:3px 9px;border-radius:20px;border:1px solid ${e?'#A32D2D':'#e0e0d8'};background:${e?'#FCEBEB':'transparent'};color:${e?'#A32D2D':'inherit'};user-select:none">${s.flag} ${s.naz}</span>`;
  });
  h += `</div></div>`;
  return h;
}

// ---- DRAFT ----
function pgDraft() {
  if (L.myId === null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra</div>`;
  const mt = myTeam(), rosa = mt.rosa||[];
  const roles = ['P','D','C','A'], rn = {P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
  let h = `<div class="card"><div class="quota-row">`;
  roles.forEach(r => {
    const c = rCount(rosa,r), m = QUOTA[r];
    const cls = c===m?'quota-ok':c>m?'quota-over':'quota-warn';
    h += `<div class="quota-box"><div class="quota-num ${cls}">${c}/${m}</div><div class="quota-label">${rn[r]}</div></div>`;
  });
  h += `</div></div><div class="card"><div class="card-title">Scegli i tuoi giocatori</div><div class="role-tabs">`;
  roles.forEach(r => h += `<button class="role-btn ${L.draftRole===r?'active':''}" data-drole="${r}">${rn[r]} ${rCount(rosa,r)}/${QUOTA[r]}</button>`);
  h += `</div><input class="search-box" id="draft-search" placeholder="🔍 Cerca giocatore o nazione..." value="${L.draftSearch}">`;
  let players = [];
  NAZ.forEach(s => s.g.filter(p => p.r===L.draftRole).forEach(p => players.push({...p, naz:s.naz, flag:s.flag})));
  if (L.draftSearch) players = players.filter(p => p.n.toLowerCase().includes(L.draftSearch.toLowerCase()) || p.naz.toLowerCase().includes(L.draftSearch.toLowerCase()));
  players.sort((a,b) => a.n.localeCompare(b.n));
  const canAdd = rCount(rosa, L.draftRole) < QUOTA[L.draftRole];
  players.forEach(p => {
    const has = rosa.some(r => r.n===p.n && r.naz===p.naz);
    const e = isElim(p.naz);
    h += `<div class="player-item">
      <div class="checkbox ${has?'checked':!canAdd&&!has?'disabled':''}" data-addp='${JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag})}'>${has?'✓':''}</div>
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info">
        <div class="player-name">${p.n}</div>
        <div class="player-nation">${p.flag} ${p.naz}${e?'<span class="eliminated-badge">ELIM</span>':''}</div>
      </div></div>`;
  });
  return h + '</div>';
}

// ---- FORMAZIONE ----
function pgFormazione() {
  if (L.myId === null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra</div>`;
  const gk = L.giornata, mod = L.modulo;
  const saved = formations[L.myId+'_'+gk];
  const form = saved?.formazione || {};
  const parts = mod.split('-').map(Number), nD=parts[0], nC=parts[1], nA=parts[2];
  const votiG = voti[gk]||{};
  const getV = p => p ? (votiG[p.n+'_'+p.naz] ?? null) : null;
  const slotP = form.P||null;
  const pad = (arr,n) => (arr||[]).slice(0,n).concat(Array(Math.max(0,n-(arr||[]).length)).fill(null));
  const sD=pad(form.D,nD), sC=pad(form.C,nC), sA=pad(form.A,nA);
  const mkSlot=(p,idx,r)=>{
    const v=getV(p), e=p&&isElim(p.naz);
    return `<div class="player-slot ${p?'filled':''} ${e?'eliminated':''}" data-fslot="${r}" data-idx="${idx}">
      ${p?`<div class="slot-name">${p.n.split(' ').pop()}</div><div class="slot-nation">${p.flag||flag(p.naz)}</div><div class="slot-vote">${v!==null?v:'?'}</div>`:`<div class="slot-empty">+${r}</div>`}
    </div>`;
  };
  let tot=0;
  [slotP,...sD,...sC,...sA].forEach(p=>{ if(p&&!isElim(p.naz)){ const v=getV(p); if(v!==null) tot+=parseFloat(v); }});
  let h=`<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="gk-prev">◀</button><span>Giornata ${gk}</span><button class="gsel-btn" id="gk-next">▶</button></div>
    <div class="module-selector">`;
  MODULI.forEach(m => h+=`<button class="mod-btn ${mod===m?'active':''}" data-mod="${m}">${m}</button>`);
  h+=`</div><div style="font-size:11px;color:#888;margin-bottom:8px">Tocca uno slot per assegnare un giocatore</div>
    <div class="field">
      <div class="field-row">${mkSlot(slotP,0,'P')}</div>
      <div class="field-row">${sD.map((p,i)=>mkSlot(p,i,'D')).join('')}</div>
      <div class="field-row">${sC.map((p,i)=>mkSlot(p,i,'C')).join('')}</div>
      <div class="field-row">${sA.map((p,i)=>mkSlot(p,i,'A')).join('')}</div>
    </div>
    <div class="score-total"><span style="font-size:13px;color:#888">Punteggio G${gk}</span><span style="font-size:20px;font-weight:700;color:#1D9E75">${tot.toFixed(1)} pt</span></div>
  </div>`;
  return h;
}

// ---- SLOT PICKER ----
function openPicker(r, idx) {
  const mt = myTeam(), avail = (mt.rosa||[]).filter(p => p.r===r);
  const rN={P:'Portiere',D:'Difensore',C:'Centrocampista',A:'Attaccante'};
  let h=`<div class="modal-overlay" id="modal-bg"><div class="modal-sheet">
    <div class="modal-header"><span class="modal-title">Scegli ${rN[r]}</span><span class="modal-close" id="modal-close">✕</span></div>`;
  if(!avail.length) h+=`<div style="color:#888;text-align:center;padding:20px">Nessun ${r} in rosa</div>`;
  avail.forEach(p=>{
    const e=isElim(p.naz);
    h+=`<div class="player-item">
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info"><div class="player-name" style="${e?'opacity:.4':''}">${p.n}</div><div class="player-nation">${p.flag||flag(p.naz)} ${p.naz}${e?'<span class="eliminated-badge">ELIM</span>':''}</div></div>
      ${!e?`<button class="btn-secondary" style="font-size:12px;padding:5px 10px" data-pick='${JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag})}' data-pickr="${r}" data-pickidx="${idx}">Scegli</button>`:'<span style="font-size:11px;color:#A32D2D">n.d.</span>'}
    </div>`;
  });
  h+=`</div></div>`;
  const div=document.createElement('div'); div.id='picker'; div.innerHTML=h;
  document.body.appendChild(div);
  div.querySelector('#modal-close').onclick=()=>div.remove();
  div.querySelector('#modal-bg').onclick=e=>{if(e.target.id==='modal-bg')div.remove();};
  div.querySelectorAll('[data-pick]').forEach(btn=>{
    btn.onclick=async()=>{
      btn.disabled=true; btn.textContent='...';
      const p=JSON.parse(btn.dataset.pick), ri=btn.dataset.pickr, i=parseInt(btn.dataset.pickidx);
      const gk=L.giornata, key=L.myId+'_'+gk;
      const saved=formations[key]||{};
      const form=JSON.parse(JSON.stringify(saved.formazione||{}));
      const np=L.modulo.split('-').map(Number);
      const ns=ri==='D'?np[0]:ri==='C'?np[1]:np[2];
      if(ri==='P') form.P=p;
      else {
        if(!form[ri]) form[ri]=Array(ns).fill(null);
        while(form[ri].length<ns) form[ri].push(null);
        form[ri][i]=p;
      }
      await saveFormation(L.myId, gk, L.modulo, form);
      formations[key]={team_id:L.myId, giornata:gk, modulo:L.modulo, formazione:form};
      div.remove();
      paint();
    };
  });
}

function pgVoti() {
  const gk=L.giornata, vG=voti[gk]||{};
  let h=`<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="vk-prev">◀</button><span>Voti Giornata ${gk}</span><button class="gsel-btn" id="vk-next">▶</button></div>
    <div style="font-size:12px;color:#1D9E75;margin-bottom:10px">🌐 Voti condivisi con tutti i manager</div>`;
  NAZ.forEach(s=>{
    h+=`<div class="section-label">${s.flag} ${s.naz}</div>`;
    s.g.forEach(p=>{
      const key=p.n+'_'+s.naz, val=vG[key]!==undefined?vG[key]:'';
      h+=`<div class="player-item">
        <span class="role-badge role-${p.r}">${p.r}</span>
        <div class="player-info"><div class="player-name">${p.n}</div></div>
        <input class="vote-input" data-vkey="${key}" value="${val}" placeholder="6" type="number" step=".5" min="0" max="10">
      </div>`;
    });
  });
  h+=`<button class="btn-primary" id="btn-save-voti">✅ Salva voti e calcola punteggi</button></div>`;
  return h;
}

    if(!rosa.length){h+=`<div style="font-size:12px;color:#ccc">Rosa non compilata</div>`;} 
    else {
      h+=`<div class="rosa-players">`;
      roles.forEach(r=>rosa.filter(p=>p.r===r).forEach(p=>{
        const e=isElim(p.naz);
        h+=`<span class="rosa-pill ${r}" style="${e?'opacity:.4;text-decoration:line-through':''}">${p.flag||flag(p.naz)} ${p.n}</span>`;
      }));
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div><button class="btn-primary" id="btn-refresh" style="margin-top:0">🔄 Aggiorna</button>`;
  return h;
}

// ---- CLASSIFICA ----
function pgClassifica() {
  const sorted=[...teams].sort((a,b)=>b.puntiTotali-a.puntiTotali);
  let h=`<div class="card"><div class="card-title">🏆 Classifica</div>`;
  sorted.forEach((t,i)=>{
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    h+=`<div class="classifica-row">
      <div class="pos-badge ${pc}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${t.id===L.myId?'👑 ':''}${t.name}</div><div style="font-size:11px;color:#888">${t.manager}</div></div>
      <div style="text-align:right"><div class="team-pts">${(t.puntiTotali||0).toFixed(1)}</div><div style="font-size:10px;color:#888">pt</div></div>
    </div>`;
  });
  return h+'</div>';
}

// ============================================================
// BIND EVENTS
// ============================================================
function bindEvents() {
  document.querySelectorAll('.tab').forEach(t => t.onclick=()=>setTab(t.dataset.tab));

  if (activeTab==='squadre') {
    document.querySelectorAll('.team-card').forEach(el=>el.onclick=()=>{
      L.myId=parseInt(el.dataset.tid); saveL(); paint();
    });
    document.getElementById('btn-save-team')?.addEventListener('click', async()=>{
      const btn=document.getElementById('btn-save-team');
      btn.disabled=true; btn.textContent='⏳ Salvo...';
      const mt=myTeam();
      mt.name=document.getElementById('inp-name').value||mt.name;
      mt.manager=document.getElementById('inp-mgr').value||mt.manager;
      try {
        await saveTeam(mt);
        btn.textContent='✅ Salvato!';
        setTimeout(()=>paint(), 800);
      } catch(e) {
        btn.textContent='❌ Errore'; btn.disabled=false;
        alert('Errore salvataggio: '+e.message);
      }
    });
    document.querySelectorAll('[data-elim]').forEach(el=>el.onclick=async()=>{
      const naz=el.dataset.elim, idx=eliminated.indexOf(naz);
      if(idx>-1) eliminated.splice(idx,1); else eliminated.push(naz);
      el.style.opacity='0.5';
      try { await saveEliminated(); } catch(e) { alert('Errore: '+e.message); }
      paint();
    });
  }

  if (activeTab==='draft') {
    document.querySelectorAll('.role-btn').forEach(b=>b.onclick=()=>{L.draftRole=b.dataset.drole;L.draftSearch='';saveL();paint();});
    document.getElementById('draft-search')?.addEventListener('input',e=>{L.draftSearch=e.target.value;saveL();paint();});
    document.querySelectorAll('[data-addp]').forEach(el=>el.onclick=async()=>{
      if(el.classList.contains('disabled')) return;
      el.style.opacity='0.4'; el.style.pointerEvents='none';
      const p=JSON.parse(el.dataset.addp);
      const mt=myTeam(), rosa=mt.rosa||[];
      const idx=rosa.findIndex(r=>r.n===p.n&&r.naz===p.naz);
      if(idx>-1) rosa.splice(idx,1);
      else if(rCount(rosa,p.r)<QUOTA[p.r]) rosa.push(p);
      mt.rosa=rosa;
      try {
        await saveTeam(mt);
        paint();
      } catch(e) {
        el.style.opacity=''; el.style.pointerEvents='';
        alert('Errore salvataggio: '+e.message);
      }
    });
  }

  if (activeTab==='formazione') {
    document.getElementById('gk-prev')?.onclick=()=>{if(L.giornata>1){L.giornata--;saveL();paint();}};
    document.getElementById('gk-next')?.onclick=()=>{L.giornata++;saveL();paint();};
    document.querySelectorAll('[data-mod]').forEach(b=>b.onclick=()=>{L.modulo=b.dataset.mod;saveL();paint();});
    document.querySelectorAll('[data-fslot]').forEach(el=>el.onclick=()=>openPicker(el.dataset.fslot,parseInt(el.dataset.idx)));
  }

  if (activeTab==='voti') {
    document.getElementById('vk-prev')?.onclick=()=>{if(L.giornata>1){L.giornata--;saveL();paint();}};
    document.getElementById('vk-next')?.onclick=()=>{L.giornata++;saveL();paint();};
    document.getElementById('btn-save-voti')?.addEventListener('click', async()=>{
      const btn=document.getElementById('btn-save-voti');
      btn.disabled=true; btn.textContent='⏳ Salvo voti...';
      const gk=L.giornata;
      if(!voti[gk]) voti[gk]={};
      document.querySelectorAll('[data-vkey]').forEach(inp=>{
        const v=parseFloat(inp.value);
        if(!isNaN(v)) voti[gk][inp.dataset.vkey]=v;
      });
      try {
        await saveVoti(gk, voti[gk]);
        // Calcola punteggi
        btn.textContent='⏳ Calcolo punteggi...';
        for (const t of teams) {
          const fk=t.id+'_'+gk, fd=formations[fk];
          if(!fd) continue;
          const mod=fd.modulo||'4-3-3', form=fd.formazione||{};
          const np=mod.split('-').map(Number);
          const sD=(form.D||[]).slice(0,np[0]),sC=(form.C||[]).slice(0,np[1]),sA=(form.A||[]).slice(0,np[2]);
          let tot=0;
          [form.P,...sD,...sC,...sA].forEach(p=>{if(p&&!isElim(p.naz)){const v=voti[gk]?.[p.n+'_'+p.naz];if(v!==undefined)tot+=parseFloat(v);}});
          if(!t.puntiGiornate) t.puntiGiornate=[];
          t.puntiGiornate[gk-1]=Math.round(tot*10)/10;
          t.puntiTotali=Math.round(t.puntiGiornate.reduce((a,b)=>a+(b||0),0)*10)/10;
          await saveTeam(t);
        }
        btn.textContent='✅ Salvato!';
        setTimeout(()=>paint(), 1000);
      } catch(e) {
        btn.textContent='❌ Errore'; btn.disabled=false;
        alert('Errore: '+e.message);
      }
    });
  }

  if (activeTab==='rose') {
    document.getElementById('btn-refresh')?.onclick=async()=>{
      document.getElementById('btn-refresh').textContent='⏳ Aggiorno...';
      await loadAll(); paint();
    };
  }
}

// BOOT
// ============================================================
(async()=>{
  try {
    await loadAll();
    document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setTab(t.dataset.tab));
    paint();
  } catch(e) {
    document.getElementById('content').innerHTML=`<div style="padding:20px;text-align:center;color:#A32D2D;font-size:14px">
      ❌ Errore connessione Supabase<br><br>${e.message}<br><br>
      <button onclick="location.reload()" style="padding:10px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">Riprova</button>
    </div>`;
  }
})();
</script>
