<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:.5px solid #e0e0d8;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge-pill{font-size:11px;background:#1D9E75;color:#fff;border-radius:20px;padding:2px 9px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.tabs{display:flex;border-bottom:.5px solid #e0e0d8;background:#fff;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:58px;padding:10px 2px 9px;font-size:11px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}
.content{flex:1;padding:12px 12px 100px}
.card{background:#fff;border-radius:12px;border:.5px solid #e0e0d8;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-card{background:#f8f8f4;border-radius:10px;border:.5px solid #e0e0d8;padding:10px 12px;cursor:pointer}
.team-card.selected{border:1.5px solid #1D9E75;background:#E1F5EE}
.team-name{font-size:13px;font-weight:600}
.team-manager{font-size:11px;color:#888;margin-top:2px}
.team-count{font-size:11px;color:#1D9E75;margin-top:4px;font-weight:500}
.role-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.role-btn{padding:6px 12px;border-radius:20px;font-size:12px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.role-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.player-item:last-child{border-bottom:none}
.role-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:28px;text-align:center}
.role-P{background:#E6F1FB;color:#185FA5}
.role-D{background:#EAF3DE;color:#3B6D11}
.role-C{background:#FAEEDA;color:#854F0B}
.role-A{background:#FCEBEB;color:#A32D2D}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-nation{font-size:11px;color:#888}
.checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.checkbox.disabled{opacity:.35;cursor:not-allowed}
.quota-row{display:flex;gap:8px;margin-bottom:12px}
.quota-box{flex:1;background:#f8f8f4;border-radius:8px;padding:8px 4px;text-align:center}
.quota-num{font-size:18px;font-weight:600}
.quota-label{font-size:9px;color:#888;margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.quota-ok{color:#1D9E75}.quota-warn{color:#BA7517}.quota-over{color:#A32D2D}
.field{background:linear-gradient(180deg,#1a6b34 0%,#1a5c2e 100%);border-radius:12px;padding:16px 8px;min-height:300px}
.field-row{display:flex;justify-content:center;gap:3px;margin-bottom:10px}
.player-slot{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:6px 2px;text-align:center;min-width:50px;max-width:74px;flex:1;cursor:pointer}
.player-slot.filled{background:rgba(255,255,255,.2)}
.player-slot.eliminated{opacity:.4;background:rgba(200,40,40,.35)}
.slot-name{font-size:11.5px;color:#fff;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-nation{font-size:13px;color:rgba(255,255,255,.75);margin-top:2px}
.slot-vote{font-size:14px;color:#7adfb0;font-weight:800;margin-top:3px}
.slot-empty{font-size:9px;color:rgba(255,255,255,.4);padding:4px 0}
.module-selector{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mod-btn{padding:5px 11px;font-size:12px;border-radius:20px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.mod-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.classifica-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.classifica-row:last-child{border-bottom:none}
.pos-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#f0f0e8;color:#888;flex-shrink:0}
.pos-badge.gold{background:#FAEEDA;color:#854F0B}
.pos-badge.silver{background:#f0f0f0;color:#555}
.pos-badge.bronze{background:#fde8d8;color:#854F0B}
.team-pts{font-size:16px;font-weight:700;color:#1D9E75;margin-left:auto}
.btn-primary{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btn-primary:disabled{opacity:.5}
.btn-secondary{background:transparent;color:#1a1a1a;border:.5px solid #ccc;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:500}
.input-field{width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;margin-bottom:8px;outline:none}
.input-field:focus{border-color:#1D9E75}
.vote-input{width:65px;padding:6px 8px;border-radius:6px;border:.5px solid #ccc;background:#f8f8f4;color:#1a1a1a;font-size:14px;text-align:center;outline:none}
.vote-input:focus{border-color:#1D9E75}
.eliminated-badge{font-size:9px;background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
.section-label{font-size:11px;color:#888;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.giornata-selector{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.giornata-selector span{font-size:15px;font-weight:600;flex:1;text-align:center}
.gsel-btn{background:#f0f0e8;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#1a1a1a}
.search-box{width:100%;padding:9px 14px;border-radius:10px;border:.5px solid #e0e0d8;background:#f8f8f4;color:#1a1a1a;font-size:14px;margin-bottom:10px;outline:none}
.search-box:focus{border-color:#1D9E75;background:#fff}
.score-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:.5px solid #e0e0d8}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:75vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{font-size:22px;cursor:pointer;color:#888;padding:4px}
.bonus-row{background:#f7f7f2}
.bonus-toggle-active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.bonus-toggle-inactive{background:#fff;color:#888;border-color:#ddd}
.bonus-counter-btn{background:#fff;color:#1D9E75;border-color:#ddd}

.rosa-view{background:#f8f8f4;border-radius:8px;padding:10px;margin-bottom:8px}
.rosa-view-name{font-size:13px;font-weight:600;margin-bottom:6px}
.rosa-players{display:flex;flex-wrap:wrap;gap:4px}
.rosa-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff;border:.5px solid #e0e0d8}
.rosa-pill.P{border-color:#185FA5;color:#185FA5}
.rosa-pill.D{border-color:#3B6D11;color:#3B6D11}
.rosa-pill.C{border-color:#854F0B;color:#854F0B}
.rosa-pill.A{border-color:#A32D2D;color:#A32D2D}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #e0e0d8;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

  eliminated = (e||[]).map(r => r.naz);
  voti = {};
  (v||[]).forEach(r => { if(!voti[r.giornata]) voti[r.giornata]={}; voti[r.giornata][r.player_key]=r.voto; });
  eventi = {};
  (ev||[]).forEach(r => { if(!eventi[r.giornata]) eventi[r.giornata]={}; eventi[r.giornata][r.player_key]=r; });
  formations = {};
  (f||[]).forEach(r => { formations[r.team_id+'_'+r.giornata]=r; });
  if(l && l[0]) formLock = {giornata:l[0].giornata, locked:l[0].locked, auto_lock_at:l[0].auto_lock_at};
  giornateCalcolate = {};
  (g||[]).forEach(r => { giornateCalcolate[r.giornata] = !!r.calcolata; });
}

// Recalculate puntiGiornate/puntiTotali for all teams for a given giornata.
// If the giornata is "calcolata", apply substitution logic (titolari senza voto
// vengono sostituiti dal primo panchinaro disponibile con voto, in ordine slot).
async function recalcPunti(gk) {
  const calcolata = !!giornateCalcolate[gk];
  const vG = voti[gk]||{};
  const getV = p => p ? (vG[p.n+'_'+p.naz]??null) : null;
  for(const t of teams) {
    const fd = formations[t.id+'_'+gk];
    if(!fd) continue;
    const mod=fd.modulo||'4-3-3', form=fd.formazione||{};
    const np=mod.split('-').map(Number);
    const sD=(form.D||[]).slice(0,np[0]),sC=(form.C||[]).slice(0,np[1]),sA=(form.A||[]).slice(0,np[2]);
    const benchSlotsAll = fd.benchSlots||{};
    let tot=0;
    const addVote = (p) => {
      if(!p) return;
      const pk=p.n+'_'+p.naz;
      const v=vG[pk];
      if(v!==undefined){
        const e=eventi[gk]?.[pk];
        tot+=parseFloat(v)+calcBonus(e);
      }
    };
    const processRole = (role, slots) => {
      if(!calcolata) {
        slots.forEach(addVote);
        return;
      }
      const bench = (benchSlotsAll[role]||[]).filter(Boolean);
      let benchIdx = 0;
      slots.forEach(slot => {
        if(!slot) return;
        if(getV(slot)!==null) { addVote(slot); return; }
        // titolare senza voto: cerca primo panchinaro con voto
        while(benchIdx < bench.length) {
          const cand = bench[benchIdx];
          benchIdx++;
          if(getV(cand)!==null) { addVote(cand); return; }
        }
      });
    };
    processRole('P', [form.P]);
    processRole('D', sD);
    processRole('C', sC);
    processRole('A', sA);
    if(!t.puntiGiornate) t.puntiGiornate=[];
    t.puntiGiornate[gk-1]=Math.round(tot*10)/10;
    t.puntiTotali=Math.round(t.puntiGiornate.reduce((a,b)=>a+(b||0),0)*10)/10;
    await saveTeam(t);
  }
}

async function saveEventi(giornata, eventiObj) {

  if(rows.length) await sbUpsert('eventi_fm', rows);
}

const EMPTY_EVENT = {gol:0,assist:0,ammonizione:false,espulsione:false,rigore_segnato:0,rigore_sbagliato:0,rigore_parato:0,gol_subiti:0,porta_inviolata:false};
function calcBonus(e) {
  if(!e) return 0;
  let b = 0;
  b += (e.gol||0)*3;
  b += (e.assist||0)*1;
  b += (e.rigore_segnato||0)*2;
  b += (e.rigore_sbagliato||0)*-3;
  b += (e.rigore_parato||0)*3;
  if(e.ammonizione) b -= 0.5;
  if(e.espulsione) b -= 1;
  if(e.porta_inviolata) b += 1;
  b += (e.gol_subiti||0)*-1;
  return b;
}

function buildPlayerList(rosa, role, search) {
  // Normalize names for tolerant matching: accents, ø/Ø, jr/junior, abbreviations
  const norm = s => (s||'')
    .replace(/[øØ]/g,'o')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim()
    .replace(/\bjr\b\.?/g,'junior');
  const namesMatch = (a, b) => {
    const na=norm(a), nb=norm(b);
    if(na===nb) return true;
    const wordsA = na.split(/\s+/), wordsB = nb.split(/\s+/);
    const lastA = wordsA[wordsA.length-1].replace('.',''), lastB = wordsB[wordsB.length-1].replace('.','');
    const firstA = wordsA[0].replace('.',''), firstB = wordsB[0].replace('.','');
    // "Messi" (1 word) vs "Lionel Messi" (2 words): single word must equal the SURNAME (last word) of the other
    if(wordsA.length===1 && wordsB.length>1) return na===lastB;
    if(wordsB.length===1 && wordsA.length>1) return nb===lastA;
    // Suffix match for multi-word: "Vinicius Junior" vs "Junior" already covered above; here both >1 word
    if(na.endsWith(' '+nb) || nb.endsWith(' '+na)) return true;
    // "Costa D." vs "Diogo Costa": last word is an initial
    if(lastA.length===1 && firstB[0]===lastA && firstA===lastB) return true;
    if(lastB.length===1 && firstA[0]===lastB && firstB===lastA) return true;
    // "B. Fernandes" vs "Bruno Fernandes": first word is a single-letter initial + same surname
    if(lastA===lastB && lastA.length>2) {
      if(firstA.length===1 && firstA[0]===firstB[0]) return true;
      if(firstB.length===1 && firstB[0]===firstA[0]) return true;
    }
    return false;
  };

  const myId = L.myId;

  let players = [];
  NAZ.forEach(s => s.g.filter(p => p.r===role).forEach(p => players.push({...p, naz:s.naz, flag:s.flag})));
  if(search) players = players.filter(p => p.n.toLowerCase().includes(search.toLowerCase()) || p.naz.toLowerCase().includes(search.toLowerCase()));
  players.sort((a,b) => a.n.localeCompare(b.n));
  let h = '';
  players.forEach(p => {
    const has = rosa.some(r => norm(r.naz)===norm(p.naz) && namesMatch(r.n,p.n));
    let takenBy = null;
    if(!has) {
      const owner = teams.find(t => t.id!==myId && (t.rosa||[]).some(r=>norm(r.naz)===norm(p.naz) && namesMatch(r.n,p.n)));
      if(owner) takenBy = owner.name;
    }
    const e = isElim(p.naz);
    const disabled = (takenBy && !has);
    const addpData = JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    h += `<div class="player-item" style="${takenBy?'opacity:.45':''}">
      <div class="checkbox ${has?'checked':disabled?'disabled':''}" data-addp="${addpData}">${has?'✓':takenBy?'🔒':''}</div>
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info">
        <div class="player-name">${p.n}</div>
        <div class="player-nation">${p.flag} ${p.naz}${e?'<span class="eliminated-badge">ELIM</span>':''}${takenBy?`<span style="font-size:9px;color:#888;margin-left:4px">preso da ${takenBy}</span>`:''}</div>
      </div></div>`;
  });
  return h;
}

function pgFormazione() {
  if(L.myId===null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra</div>`;
  const gk=L.giornata;
  const viewId = (L.viewTeamId!==undefined && L.viewTeamId!==null) ? L.viewTeamId : L.myId;
  const isOwnTeam = viewId === L.myId;
  const locked = (isFormazioneLocked(gk) && !L.adminUnlocked) || !isOwnTeam;
  let saved = formations[viewId+'_'+gk];
  let carriedOver = false;
  // Treat formation as "empty" if it has no titolari at all
  const isEmpty = f => !f || !(f.formazione?.P || (f.formazione?.D||[]).some(Boolean) || (f.formazione?.C||[]).some(Boolean) || (f.formazione?.A||[]).some(Boolean));
  // If no formation (or empty) for this giornata, carry over from previous giornata as a starting point
  if(isEmpty(saved) && gk > 1) {
    const prev = formations[viewId+'_'+(gk-1)];
    if(!isEmpty(prev)) {
      saved = prev;
      carriedOver = true;
    }
  }
  const mod = saved?.modulo || '4-3-3';
  const form = saved?.formazione || {};
  const parts = mod.split('-').map(Number), nD=parts[0], nC=parts[1], nA=parts[2];
  const votiG = voti[gk]||{};
  const eventiG = eventi[gk]||{};
  const getV = p => p ? (votiG[p.n+'_'+p.naz]??null) : null;
  const getVTotal = p => {
    if(!p) return null;
    const base = votiG[p.n+'_'+p.naz];
    if(base===undefined || base===null) return null;
    const ev = eventiG[p.n+'_'+p.naz];
    const total = parseFloat(base) + calcBonus(ev);
    return Math.round(total*10)/10;
  };
  const getBonusIcons = p => {
    if(!p) return '';
    const e = eventiG[p.n+'_'+p.naz];
    if(!e) return '';
    let icons = '';
    for(let i=0;i<(e.gol||0);i++) icons += '⚽';
    for(let i=0;i<(e.assist||0);i++) icons += '👟';
    for(let i=0;i<(e.rigore_segnato||0);i++) icons += '🎯';
    for(let i=0;i<(e.rigore_sbagliato||0);i++) icons += '❌';
    for(let i=0;i<(e.rigore_parato||0);i++) icons += '🧤';
    if(e.ammonizione) icons += '🟨';
    if(e.espulsione) icons += '🟥';
    if(e.porta_inviolata) icons += '🛡️';
    for(let i=0;i<(e.gol_subiti||0);i++) icons += '😬';
    return icons;
  };
  const slotP = form.P||null;
  const pad = (arr,n) => (arr||[]).slice(0,n).concat(Array(Math.max(0,n-(arr||[]).length)).fill(null));
  const sD=pad(form.D,nD), sC=pad(form.C,nC), sA=pad(form.A,nA);
  const titolari = [slotP,...sD,...sC,...sA].filter(Boolean);
  const mt = teams.find(t=>t.id===viewId) || myTeam(), rosa = mt.rosa||[];
  const panchina = rosa.filter(p => !titolari.some(t => t && t.n===p.n && t.naz===p.naz));

  // Compute lineup with auto-substitution
  // For each role, determine which titolari have no vote (red down arrow),
  // and which bench players act as their substitutes (green up arrow), in slot order.
  // This logic only applies once the giornata is marked as "calcolata" (all matches finished).
  const giornataCalcolata = !!giornateCalcolate[gk];
  const benchSlotsAll = formations[viewId+'_'+gk]?.benchSlots || {};
  const activeSubs = {}; // pkey -> true, for bench players that are substituting
  function computeTitolari(role, slots) {
    if(!giornataCalcolata) {
      return slots.map(slot => slot ? {player:slot, noVote:false} : null);
    }
    const bench = (benchSlotsAll[role]||[]).filter(Boolean);
    let benchIdx = 0;
    return slots.map(slot => {
      if(!slot) return null;
      const noVote = getV(slot)===null;
      if(!noVote) return {player:slot, noVote:false};
      // find next available bench sub with a vote
      while(benchIdx < bench.length) {
        const cand = bench[benchIdx];
        benchIdx++;
        if(getV(cand)!==null) {
          activeSubs[cand.n+'_'+cand.naz] = true;
          return {player:slot, noVote:true, sub:cand};
        }
      }
      return {player:slot, noVote:true, sub:null};
    });
  }

  const effPArr = computeTitolari('P', [slotP]);
  const effP = effPArr[0];
  const effD = computeTitolari('D', sD);
  const effC = computeTitolari('C', sC);
  const effA = computeTitolari('A', sA);

  let tot=0;
  [effP,...effD,...effC,...effA].forEach(e=>{
    if(!e) return;
    if(!e.noVote) {
      const v=getVTotal(e.player); if(v!==null) tot+=v;
    } else if(e.sub) {
      const v=getVTotal(e.sub); if(v!==null) tot+=v;
    }
  });

  const mkSlot=(eff,idx,r)=>{
    const p = eff?.player;
    const v = p ? getV(p) : null;
    const vTotal = p ? getVTotal(p) : null;
    const elim = p && isElim(p.naz);
    const noVote = eff?.noVote;
    const isEmpty = !p;
    const bonus = p ? getBonusIcons(p) : '';
    const voteKey = p ? p.n+'_'+p.naz : '';
    return `<div class="player-slot ${p?'filled':''} ${elim?'eliminated':''}" ${locked?'':`data-fslot="${r}" data-idx="${idx}"`} style="position:relative;${locked?'cursor:default':''}">
      ${noVote ? `<div style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#A32D2D;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1">⬇</div>` : ''}
      ${p ? `<div class="slot-name">${p.n.split(' ').pop()}</div>
              <div class="slot-nation">${p.flag||getFlag(p.naz)}</div>
              <div class="slot-vote" ${locked?'':`data-votekey="${voteKey}" data-voterole="${r}"`} style="color:#fff;${locked?'':'text-decoration:underline dotted'}">${vTotal!==null?vTotal:'?'}</div>
              ${bonus?`<div style="font-size:10px;line-height:1">${bonus}</div>`:''}`
           : `<div class="slot-empty">+${r}</div>`}
    </div>`;
  };

  // Team viewer selector
  let h = `<div class="card" style="padding-bottom:10px">
    <div style="font-size:11px;color:#888;margin-bottom:6px">Visualizza formazione di:</div>
    <select id="team-viewer" class="input-field" style="margin-bottom:0">`;
  teams.forEach(t => h += `<option value="${t.id}" ${t.id===viewId?'selected':''}>${t.id===L.myId?'👑 ':''}${t.name}</option>`);
  h += `</select>`;
  if(!isOwnTeam) {
    h += `<div style="margin-top:8px;text-align:center"><span data-back-to-mine="1" style="font-size:12px;color:#1D9E75;cursor:pointer;text-decoration:underline">← Torna alla mia formazione</span></div>`;
  }
  h += `</div>`;

  h += `<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="gk-prev">◀</button><span>Giornata ${gk}</span><button class="gsel-btn" id="gk-next">▶</button></div>`;
  if(!isOwnTeam) {
    h += `<div style="background:#E8F4FD;color:#1F6FAD;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;text-align:center">
      👀 Stai visualizzando la formazione di <strong>${mt?.name||''}</strong> — sola lettura
    </div>`;
  } else if(locked) {
    h += `<div style="background:#FCEBEB;color:#A32D2D;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;text-align:center">
      🔒 Formazioni bloccate per la Giornata ${gk} — sola lettura
      <br><span data-admin-unlock="1" style="text-decoration:underline;cursor:pointer;font-size:11px;display:inline-block;margin-top:4px">Sono admin, sblocca temporaneamente</span>
    </div>`;
  } else if(L.adminUnlocked) {
    h += `<div style="background:#FFF3CD;color:#856404;padding:8px 12px;border-radius:8px;font-size:11px;margin-bottom:10px;text-align:center">
      ⚠️ Modalità admin attiva — stai modificando una formazione bloccata per gli altri
    </div>`;
  } else if(carriedOver) {
    h += `<div style="background:#E8F4FD;color:#1F6FAD;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;text-align:center">
      ℹ️ Formazione copiata dalla Giornata ${gk-1} — modifica e salva per confermarla per questa giornata
    </div>`;
  }
  h += `<div class="module-selector">`;
  MODULI.forEach(m => h += `<button class="mod-btn ${mod===m?'active':''}" data-mod="${m}" ${locked?'disabled style="opacity:.5"':''}>${m}</button>`);
  h += `</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">Tocca uno slot per assegnare<br><span style="color:#A32D2D">⬇ titolare senza voto</span> · <span style="color:#1D9E75">⬆ panchinaro entrato</span></div>
    <div class="field">
      <div class="field-row">${mkSlot(effP,0,'P')}</div>
      <div class="field-row">${effD.map((e,i)=>mkSlot(e,i,'D')).join('')}</div>
      <div class="field-row">${effC.map((e,i)=>mkSlot(e,i,'C')).join('')}</div>
      <div class="field-row">${effA.map((e,i)=>mkSlot(e,i,'A')).join('')}</div>
    </div>
    <div class="score-total"><span style="font-size:13px;color:#888">Punteggio G${gk}</span><span style="font-size:20px;font-weight:700;color:#1D9E75">${tot.toFixed(1)} pt</span></div>
  </div>`;

  // Panchina section — slot espliciti per ruolo, click per assegnare (come i titolari)
  // benchSlots format: {P:[{n,naz,r,flag}|null,...], D:[...], C:[...], A:[...]}
  const benchSlotsRaw = formations[viewId+'_'+gk]?.benchSlots || {};
  function getPanchina(role) {
    const slots = benchSlotsRaw[role] || [];
    // Only return non-null assigned players, in slot order (for substitution logic)
    return slots.filter(Boolean);
  }
  function getBenchSlots(role) {
    // Available bench players for this role = panchina of that role
    const avail = panchina.filter(p => p.r===role);
    const slots = (benchSlotsRaw[role] || []).slice(0, avail.length);
    while(slots.length < avail.length) slots.push(null);
    return slots;
  }

  // Build WhatsApp-style export text
  function buildWhatsAppText() {
    const rn = {P:'Portiere',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
    const icons = {P:'🧤',D:'🛡️',C:'⚙️',A:'⚽'};
    const titoFlag = p => p ? `${p.flag||getFlag(p.naz)} ${p.n}` : '-';
    const mt = teams.find(t=>t.id===viewId) || myTeam();
    let txt = '';
    txt += `*${mt?.name||''}* — Giornata ${gk}\n`;
    txt += `Modulo: ${mod}\n\n`;
    txt += `${icons.P} Portiere\n${titoFlag(slotP)}\n\n`;
    txt += `${icons.D} Difensori\n${sD.map(titoFlag).join(' - ')}\n\n`;
    txt += `${icons.C} Centrocampisti\n${sC.map(titoFlag).join(' - ')}\n\n`;
    txt += `${icons.A} Attaccanti\n${sA.map(titoFlag).join(' - ')}\n\n`;
    txt += `🪑 PANCHINA (ordine sostituzione)\n`;
    ['P','D','C','A'].forEach(r => {
      const rp = getPanchina(r);
      if(!rp.length) return;
      txt += `${icons[r]} ${rn[r]==='Portiere'?'Portieri':rn[r]}\n${rp.map(titoFlag).join(' - ')}\n\n`;
    });
    return txt.trim();
  }

  const waText = buildWhatsAppText();
  const waTextEscaped = waText.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h += `<button class="btn-secondary" id="btn-copy-formazione" data-watext="${waTextEscaped}" style="width:100%;margin-bottom:10px">📋 Copia formazione per WhatsApp</button>`;

  h += `<div class="card"><div class="card-title">🪑 Panchina — ordine sostituzione</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">Tocca uno slot per assegnare il sostituto in quella posizione · il primo non eliminato entra automaticamente</div>`;
  if(panchina.length === 0) {
    h += `<div style="font-size:13px;color:#888">Nessun panchinaro — aggiungi più giocatori alla rosa</div>`;
  } else {
    const roles = ['P','D','C','A'];
    const rn = {P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
    roles.forEach(r => {
      const avail = panchina.filter(p => p.r===r);
      if(!avail.length) return;
      const slots = getBenchSlots(r);
      h += `<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px">${rn[r]} (${avail.length} disponibili)</div>`;
      slots.forEach((p, i) => {
        if(p) {
          const v = getV(p);
          const vTotal = getVTotal(p);
          const elim = isElim(p.naz);
          const bonus = getBonusIcons(p);
          const voteKey = p.n+'_'+p.naz;
          const isActiveSub = !!activeSubs[voteKey];
          h += `<div class="player-item" style="${elim&&!isActiveSub?'opacity:.45':''}">
            <span style="font-size:11px;color:#888;min-width:16px;text-align:center;font-weight:600">${i+1}</span>
            <span class="role-badge role-${p.r}">${p.r}</span>
            <div class="player-info">
              <div class="player-name" style="${isActiveSub?'color:#1D9E75':''}">${isActiveSub?'⬆ ':''}${p.n}</div>
              <div class="player-nation">${p.flag||getFlag(p.naz)} ${p.naz}${elim?'<span class="eliminated-badge">ELIM</span>':''}</div>
            </div>
            <span style="font-size:11px;margin-right:4px">${bonus}</span>
            <span style="font-size:14px;font-weight:600;color:${v!==null?'#1D9E75':'#ccc'};min-width:28px;text-align:right;${locked?'':'text-decoration:underline dotted;cursor:pointer'}" ${locked?'':`data-votekey="${voteKey}" data-voterole="${r}"`}>${vTotal!==null?vTotal:'-'}</span>
          </div>`;
        } else {
          h += `<div class="player-item" style="opacity:.5">
            <span style="font-size:11px;color:#888;min-width:16px;text-align:center;font-weight:600">${i+1}</span>
            <div class="player-info"><div class="player-name" style="color:#bbb">— vuoto —</div></div>
          </div>`;
        }
      });
      if(!locked) h += `<button class="btn-secondary" data-benchedit="${r}" style="width:100%;margin:6px 0 4px;font-size:12px">✏️ Modifica panchina ${rn[r]}</button>`;
    });
  }
  h += `</div>`;

  if(!locked) h += `<button class="btn-primary" id="btn-salva-form">💾 Salva formazione</button>`;
  else h += `<div style="text-align:center;padding:10px;font-size:12px;color:#888">Sola lettura — contatta l'admin per modifiche</div>`;

  return h;
}

function openPicker(r, idx) {
  const mt = myTeam();
  const gk=L.giornata, fkey=L.myId+'_'+gk;
const _isEmptyForm = f => !f || !(f.formazione?.P || (f.formazione?.D||[]).some(Boolean) || (f.formazione?.C||[]).some(Boolean) || (f.formazione?.A||[]).some(Boolean));
  let existing = formations[fkey];
  if(_isEmptyForm(existing) && gk > 1) existing = formations[L.myId+'_'+(gk-1)];
  const form = existing?.formazione || {};
  // Players already used in OTHER slots (same role, different index, or different role's slot)
  const usedElsewhere = new Set();
  if(form.P && !(r==='P' && idx===0)) usedElsewhere.add(form.P.n+'_'+form.P.naz);
  ['D','C','A'].forEach(role => {
    (form[role]||[]).forEach((p,i) => {
      if(p && !(role===r && i===idx)) usedElsewhere.add(p.n+'_'+p.naz);
    });
  });
  const avail = (mt.rosa||[]).filter(p => p.r===r && !usedElsewhere.has(p.n+'_'+p.naz));
  const rN={P:'Portiere',D:'Difensore',C:'Centrocampista',A:'Attaccante'};
  let h = `<div class="modal-overlay" id="modal-bg"><div class="modal-sheet">
    <div class="modal-header"><span class="modal-title">Scegli ${rN[r]}</span><span class="modal-close" id="modal-close">✕</span></div>`;
  if(!avail.length) h += `<div style="color:#888;text-align:center;padding:20px">Nessun ${r} in rosa</div>`;
  avail.forEach(p => {
    const e = isElim(p.naz);
    const pd = encodeURIComponent(JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag}));
    h += `<div class="player-item">
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info"><div class="player-name" style="${e?'opacity:.4':''}">${p.n}</div><div class="player-nation">${p.flag||getFlag(p.naz)} ${p.naz}${e?'<span class="eliminated-badge">ELIM</span>':''}</div></div>
      ${!e?`<button class="btn-secondary" style="font-size:12px;padding:5px 10px" data-pick="${pd}" data-pickr="${r}" data-pickidx="${idx}">Scegli</button>`:'<span style="font-size:11px;color:#A32D2D">n.d.</span>'}
    </div>`;
  });
  h += `</div></div>`;
  const div = document.createElement('div'); div.id='picker'; div.innerHTML=h;
  document.body.appendChild(div);
  div.querySelector('#modal-close').onclick = () => div.remove();
  div.querySelector('#modal-bg').onclick = e => { if(e.target.id==='modal-bg') div.remove(); };
  div.querySelectorAll('[data-pick]').forEach(btn => {
    btn.onclick = async () => {
      btn.disabled=true; btn.textContent='...';
      const p = JSON.parse(decodeURIComponent(btn.dataset.pick));
      const ri=btn.dataset.pickr, i=parseInt(btn.dataset.pickidx);
      const gk=L.giornata, fkey=L.myId+'_'+gk;
      const existing = formations[fkey];
      const teamMod = existing?.modulo || '4-3-3';
      const form = JSON.parse(JSON.stringify(existing?.formazione||{}));
      const np = teamMod.split('-').map(Number);
      const ns = ri==='D'?np[0]:ri==='C'?np[1]:np[2];
      if(ri==='P') form.P=p;
      else {
        if(!form[ri]) form[ri]=Array(ns).fill(null);
        while(form[ri].length<ns) form[ri].push(null);
        form[ri][i]=p;
      }
      try {
        await saveFormation(L.myId, gk, teamMod, form, existing?.benchOrder, existing?.benchSlots);
        div.remove(); paint();
      } catch(err) {
        btn.disabled=false; btn.textContent='Scegli';
        alert('Errore salvataggio: '+err.message);
      }
    };
  });
}

function openVotePopup(playerKey, role) {
  const gk = L.giornata;
  const vG = voti[gk] || {};
  const eG = eventi[gk] || {};
  const val = vG[playerKey] !== undefined ? vG[playerKey] : '';
  const ev = JSON.parse(JSON.stringify(eG[playerKey] || EMPTY_EVENT));

  const isGK = role === 'P';
  let bonusDefs = [
    {key:'gol', icon:'⚽', label:'Gol', type:'counter'},
    {key:'assist', icon:'👟', label:'Assist', type:'counter'},
    {key:'rigore_segnato', icon:'🎯', label:'Rigore segnato', type:'counter'},
    {key:'rigore_sbagliato', icon:'❌', label:'Rigore sbagliato', type:'counter'},
    {key:'ammonizione', icon:'🟨', label:'Ammonizione', type:'toggle'},
    {key:'espulsione', icon:'🟥', label:'Espulsione', type:'toggle'}
  ];
  if(isGK) {
    bonusDefs.push({key:'rigore_parato', icon:'🧤', label:'Rigore parato', type:'counter'});
    bonusDefs.push({key:'gol_subiti', icon:'😬', label:'Gol subiti', type:'counter'});
    bonusDefs.push({key:'porta_inviolata', icon:'🛡️', label:'Porta inviolata (no gol subiti)', type:'toggle'});
  }

  const playerName = playerKey.split('_').slice(0,-1).join('_');

  let h = `<div class="modal-overlay" id="modal-bg"><div class="modal-sheet">
    <div class="modal-header"><span class="modal-title">${playerName}</span><span class="modal-close" id="modal-close">✕</span></div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888">Voto base</label>
      <input id="vp-voto" type="number" step=".5" min="0" max="10" value="${val}" placeholder="6" class="input-field" style="margin-bottom:0">
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:6px">Bonus / Malus</div>
    <div id="vp-bonus-list" style="display:flex;flex-direction:column;gap:6px"></div>
    <div style="margin-top:12px;text-align:center;font-size:16px;font-weight:700;color:#1D9E75">Totale: <span id="vp-total">-</span></div>
    <button class="btn-primary" id="btn-save-vote" style="margin-top:12px">Salva voto</button>
  </div></div>`;

  const div = document.createElement('div'); div.id='picker'; div.innerHTML=h;
  document.body.appendChild(div);
  div.querySelector('#modal-close').onclick = () => div.remove();
  div.querySelector('#modal-bg').onclick = e => { if(e.target.id==='modal-bg') div.remove(); };

  const list = div.querySelector('#vp-bonus-list');
  const renderBonusList = () => {
    list.innerHTML = '';
    bonusDefs.forEach(b => {
      const row = document.createElement('div');
      row.className = 'bonus-row';
      row.style.display='flex'; row.style.alignItems='center'; row.style.justifyContent='space-between';
      row.style.padding='6px 8px'; row.style.borderRadius='8px';
      if(b.type==='toggle') {
        const active = !!ev[b.key];
        row.innerHTML = `<span style="font-size:13px">${b.icon} ${b.label}</span>`;
        const btn = document.createElement('button');
        btn.className = active ? 'bonus-toggle-active' : 'bonus-toggle-inactive';
        btn.style.fontSize='12px'; btn.style.padding='4px 12px'; btn.style.borderRadius='6px'; btn.style.border='1px solid';
        btn.style.cursor='pointer'; btn.style.fontWeight='600';
        btn.textContent = active ? 'Sì' : 'No';
        btn.onclick = () => { ev[b.key] = !ev[b.key]; renderBonusList(); updateTotal(); };
        row.appendChild(btn);
      } else {
        row.innerHTML = `<span style="font-size:13px">${b.icon} ${b.label}</span>`;
        const ctrl = document.createElement('div');
        ctrl.style.display='flex'; ctrl.style.alignItems='center'; ctrl.style.gap='10px';
        const minus = document.createElement('button');
        minus.textContent='−'; minus.className='bonus-counter-btn'; minus.style.padding='2px 12px'; minus.style.fontSize='16px'; minus.style.fontWeight='700'; minus.style.borderRadius='6px'; minus.style.border='1px solid'; minus.style.cursor='pointer';
        const val2 = document.createElement('span'); val2.textContent = ev[b.key]||0; val2.style.fontWeight='700'; val2.style.minWidth='20px'; val2.style.textAlign='center'; val2.style.fontSize='14px';
        const plus = document.createElement('button');
        plus.textContent='+'; plus.className='bonus-counter-btn'; plus.style.padding='2px 12px'; plus.style.fontSize='16px'; plus.style.fontWeight='700'; plus.style.borderRadius='6px'; plus.style.border='1px solid'; plus.style.cursor='pointer';
        minus.onclick = () => { ev[b.key] = Math.max(0,(ev[b.key]||0)-1); val2.textContent=ev[b.key]; updateTotal(); };
        plus.onclick = () => { ev[b.key] = (ev[b.key]||0)+1; val2.textContent=ev[b.key]; updateTotal(); };
        ctrl.appendChild(minus); ctrl.appendChild(val2); ctrl.appendChild(plus);
        row.appendChild(ctrl);
      }
      list.appendChild(row);
    });
  };

  const updateTotal = () => {
    const base = parseFloat(div.querySelector('#vp-voto').value);
    const total = div.querySelector('#vp-total');
    if(isNaN(base)) { total.textContent = '-'; return; }
    total.textContent = (base + calcBonus(ev)).toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
  };

  renderBonusList();
  updateTotal();
  div.querySelector('#vp-voto').addEventListener('input', updateTotal);

  div.querySelector('#btn-save-vote').onclick = async () => {
    const btn = div.querySelector('#btn-save-vote');
    const base = parseFloat(div.querySelector('#vp-voto').value);
    if(isNaN(base)) { alert('Inserisci un voto base valido'); return; }
    btn.disabled=true; btn.textContent='⏳ Salvo...';
    try {
      if(!voti[gk]) voti[gk]={};
      voti[gk][playerKey] = base;
      if(!eventi[gk]) eventi[gk]={};
      eventi[gk][playerKey] = ev;
      await saveVoti(gk, {[playerKey]: base});
      await saveEventi(gk, {[playerKey]: ev});
      // Recalculate points for all teams
      await recalcPunti(gk);
      div.remove(); paint();
    } catch(err) {
      btn.disabled=false; btn.textContent='Salva voto';
      alert('Errore: '+err.message);
    }
  };
}

function openBenchPicker(role) {
  const mt = myTeam();
  const gk=L.giornata, fkey=L.myId+'_'+gk;
  const _isEmptyForm = f => !f || !(f.formazione?.P || (f.formazione?.D||[]).some(Boolean) || (f.formazione?.C||[]).some(Boolean) || (f.formazione?.A||[]).some(Boolean));
  let existing = formations[fkey];
  if(_isEmptyForm(existing) && gk > 1) existing = formations[L.myId+'_'+(gk-1)];
  const form = existing?.formazione || {};
  const benchSlots = JSON.parse(JSON.stringify(existing?.benchSlots || {}));

  // Compute panchina (rosa minus titolari)
  const titolari = [form.P,...(form.D||[]),...(form.C||[]),...(form.A||[])].filter(Boolean);
  const rosa = mt.rosa||[];
  const panchinaAll = rosa.filter(p => !titolari.some(t => t && t.n===p.n && t.naz===p.naz));
  const avail = panchinaAll.filter(p => p.r===role);

  // Current order for this role (existing slot assignments, filtered to valid available players)
  let order = (benchSlots[role]||[]).filter(p => p && avail.some(a=>a.n===p.n&&a.naz===p.naz));

  const rN={P:'Portiere',D:'Difensore',C:'Centrocampista',A:'Attaccante'};
  const rNp={P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
  let h = `<div class="modal-overlay" id="modal-bg"><div class="modal-sheet">
    <div class="modal-header"><span class="modal-title">Panchina ${rNp[role]}</span><span class="modal-close" id="modal-close">✕</span></div>
    <div style="font-size:12px;color:#888;margin-bottom:10px">Tocca i giocatori nell'ordine in cui devono entrare: il primo selezionato è il 1° sostituto, il secondo il 2°, ecc.</div>`;
  if(!avail.length) h += `<div style="color:#888;text-align:center;padding:20px">Nessun ${role} disponibile in panchina</div>`;
  avail.forEach(p => {
    const e = isElim(p.naz);
    const pkey = p.n+'_'+p.naz;
    const pdata = JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const slotIdx = order.findIndex(o=>o.n===p.n&&o.naz===p.naz);
    h += `<div class="player-item" data-benchitem="${pdata}" style="cursor:pointer">
      <span class="role-badge role-${p.r}" style="${slotIdx>=0?'background:#1D9E75;color:#fff':''}">${slotIdx>=0?(slotIdx+1):p.r}</span>
      <div class="player-info"><div class="player-name" style="${e?'opacity:.4':''}">${p.n}</div><div class="player-nation">${p.flag||getFlag(p.naz)} ${p.naz}${e?'<span class="eliminated-badge">ELIM</span>':''}</div></div>
    </div>`;
  });
  h += `<button class="btn-primary" id="btn-save-bench" style="margin-top:10px">Salva panchina ${rNp[role]}</button>`;
  h += `</div></div>`;
  const div = document.createElement('div'); div.id='picker'; div.innerHTML=h;
  document.body.appendChild(div);
  div.querySelector('#modal-close').onclick = () => div.remove();
  div.querySelector('#modal-bg').onclick = e => { if(e.target.id==='modal-bg') div.remove(); };

  // Click handler: toggle player in/out of order, re-render badges
  div.querySelectorAll('[data-benchitem]').forEach(item => {
    item.onclick = () => {
      const decoded = item.dataset.benchitem.replace(/&quot;/g,'"').replace(/&#39;/g,"'");
      const p = JSON.parse(decoded);
      const idx = order.findIndex(o=>o.n===p.n&&o.naz===p.naz);
      if(idx>=0) order.splice(idx,1); // deselect
      else order.push(p); // add as next in order
      // Re-render badges for all items
      div.querySelectorAll('[data-benchitem]').forEach(el2 => {
        const pd2 = JSON.parse(el2.dataset.benchitem.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
        const i2 = order.findIndex(o=>o.n===pd2.n&&o.naz===pd2.naz);
        const badge = el2.querySelector('.role-badge');
        if(i2>=0) { badge.textContent = (i2+1); badge.style.background='#1D9E75'; badge.style.color='#fff'; }
        else { badge.textContent = pd2.r; badge.style.background=''; badge.style.color=''; }
      });
    };
  });

  div.querySelector('#btn-save-bench').onclick = async () => {
    const btn = div.querySelector('#btn-save-bench');
    btn.disabled=true; btn.textContent='⏳ Salvo...';
    benchSlots[role] = order;
    try {
      await saveFormation(L.myId, gk, existing?.modulo||'4-3-3', form, existing?.benchOrder, benchSlots);
      div.remove(); paint();
    } catch(err) {
      btn.disabled=false; btn.textContent='Salva panchina '+rNp[role];
      alert('Errore salvataggio: '+err.message);
    }
  };
}

function buildVotiList(gk, search) {
  const vG = voti[gk]||{};
  const s2 = (search||'').toLowerCase().trim();
  let h = '';
  NAZ.forEach(s => {
    const nazMatch = s.naz.toLowerCase().includes(s2);
    const playersToShow = s2 && !nazMatch
      ? s.g.filter(p => p.n.toLowerCase().includes(s2))
      : s.g;
    if(s2 && playersToShow.length===0) return;
    h += `<div class="section-label">${s.flag} ${s.naz}</div>`;
    playersToShow.forEach(p => {
      const key=p.n+'_'+s.naz, val=vG[key]!==undefined?vG[key]:'';
      const hasVote = val!=='';
      h += `<div class="player-item" style="${hasVote?'background:#E1F5EE':''}">
        <span class="role-badge role-${p.r}">${p.r}</span>
        <div class="player-info"><div class="player-name">${p.n}</div></div>
        <input class="vote-input" data-vkey="${key}" value="${val}" placeholder="" type="number" step=".5" min="0" max="10">
      </div>`;
    });
  });
  return h;
}

function pgVoti() {
  const gk=L.giornata;
  const calcolata = !!giornateCalcolate[gk];
  let h = `<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="vk-prev">◀</button><span>Voti Giornata ${gk}</span><button class="gsel-btn" id="vk-next">▶</button></div>
    <div style="font-size:12px;color:#1D9E75;margin-bottom:8px">Voti condivisi — tutti i manager li vedono dopo il salvataggio</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">Per bonus/malus (gol, assist, cartellini, ecc.) vai nel tab Formazione e tocca il giocatore.</div>`;
  if(calcolata) {
    h += `<div style="background:#E1F5EE;color:#0F6E56;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:8px;text-align:center">
      ✅ Giornata ${gk} calcolata — sostituzioni attive nel tab Formazione
      <br><span data-uncalcola="${gk}" style="text-decoration:underline;cursor:pointer;font-size:11px;display:inline-block;margin-top:4px">Annulla calcolo (se ci sono ancora partite/voti da inserire)</span>
    </div>`;
  } else {
    h += `<div style="background:#FFF3CD;color:#856404;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:8px;text-align:center">
      ⏳ Giornata non ancora calcolata — inserisci i voti man mano che le partite finiscono
    </div>`;
  }
  h += `<input type="text" id="voti-search" class="search-box" placeholder="🔍 Cerca giocatore o nazione..." value="${L.votiSearch||''}" autocomplete="off">
    <div id="voti-list">${buildVotiList(gk, L.votiSearch)}</div>
  <button class="btn-primary" id="btn-save-voti">Salva voti e calcola punteggi</button>
  ${!calcolata ? `<button class="btn-secondary" id="btn-calcola-giornata" style="width:100%;margin-top:8px">✅ Calcola giornata ${gk} (tutte le partite finite)</button>` : ''}
  </div>`;
  return h;
}

function pgRose() {
  let h = `<div class="card"><div class="card-title">Rose di tutte le squadre</div>`;
  const roles = ['P','D','C','A'];
  teams.forEach(t => {
    const rosa = t.rosa||[];
    h += `<div class="rosa-view"><div class="rosa-view-name">${t.id===L.myId?'👑 ':''}${t.name} <span style="font-size:11px;color:#888">(${t.manager}) · ${rosa.length}/52</span></div>`;
    if(!rosa.length) { h += `<div style="font-size:12px;color:#bbb">Rosa non ancora compilata</div>`; }
    else {
      h += `<div class="rosa-players">`;
      roles.forEach(r => rosa.filter(p=>p.r===r).forEach(p => {
        const e = isElim(p.naz);
        h += `<span class="rosa-pill ${r}" style="${e?'opacity:.4;text-decoration:line-through':''}">${p.flag||getFlag(p.naz)} ${p.n}</span>`;
      }));
      h += `</div>`;
    }
    h += `</div>`;
  });
  h += `</div>
  <div style="display:flex;gap:8px;margin-top:0">
    <button class="btn-primary" id="btn-refresh" style="flex:1;margin-top:0">🔄 Aggiorna</button>
    <button class="btn-secondary" id="btn-export-rose" style="flex:1">📤 Esporta JSON</button>
  </div>`;
  return h;
}

function pgClassifica() {
  const sorted = [...teams].sort((a,b)=>b.puntiTotali-a.puntiTotali);
  let h = `<div class="card"><div class="card-title">Classifica</div>`;
  sorted.forEach((t,i) => {
    const pc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    h += `<div class="classifica-row">
      <div class="pos-badge ${pc}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${t.id===L.myId?'👑 ':''}${t.name}</div><div style="font-size:11px;color:#888">${t.manager}</div></div>
      <div style="text-align:right"><div class="team-pts">${(t.puntiTotali||0).toFixed(1)}</div><div style="font-size:10px;color:#888">pt</div></div>
    </div>`;
  });
  return h + '</div>';
}

const _isEmptyForm = f => !f || !(f.formazione?.P || (f.formazione?.D||[]).some(Boolean) || (f.formazione?.C||[]).some(Boolean) || (f.formazione?.A||[]).some(Boolean));

      const newForm = {
        P: form.P || null,
        D: trim(form.D, np[0]),
        C: trim(form.C, np[1]),

      };

      try {

      const btn = document.getElementById('btn-copy-formazione');
      let copied = false;
      try {
        if(navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(txt);
          copied = true;
        }
      } catch(e) {}
      if(!copied) {
        try {
          const ta = document.createElement('textarea');
          ta.value = txt;
          ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          copied = document.execCommand('copy');
          document.body.removeChild(ta);
        } catch(e) {}
      }
      if(copied) {
        btn.textContent = '✅ Copiato! Incolla su WhatsApp';

const _isEmptyForm = f => !f || !(f.formazione?.P || (f.formazione?.D||[]).some(Boolean) || (f.formazione?.C||[]).some(Boolean) || (f.formazione?.A||[]).some(Boolean));
      let existing = formations[fkey];

      } catch(e) {
        btn.textContent='❌ Errore'; btn.disabled=false;
        alert('Errore: '+e.message);
      }
    });
  }

  if(activeTab==='voti') {
    document.getElementById('vk-prev').onclick = () => { if(L.giornata>1){L.giornata--;saveL();paint();} };
    document.getElementById('vk-next').onclick = () => { L.giornata++;saveL();paint(); };
    document.getElementById('btn-calcola-giornata')?.addEventListener('click', async () => {
      const gk = L.giornata;
      if(!confirm(`Confermi che tutte le partite della Giornata ${gk} sono terminate e i voti sono stati inseriti?\n\nDa questo momento i titolari senza voto verranno sostituiti automaticamente dai panchinari disponibili nel calcolo punteggio.`)) return;
      const btn = document.getElementById('btn-calcola-giornata');

      btn.disabled=true; btn.textContent='Salvo voti...';
      const gk=L.giornata;
      if(!voti[gk]) voti[gk]={};
      document.querySelectorAll('[data-vkey]').forEach(inp => {
        const v=parseFloat(inp.value);
        if(!isNaN(v)) voti[gk][inp.dataset.vkey]=v;
      });
      try {
        await saveVoti(gk, voti[gk]);
        btn.textContent='Calcolo punteggi...';
        await recalcPunti(gk);
        alert('Voti salvati! Punteggi aggiornati per tutti.');
        btn.disabled=false; btn.textContent='Salva voti e calcola punteggi';
        paint();
      } catch(e) {
        btn.disabled=false; btn.textContent='Salva voti e calcola punteggi';
        alert('Errore: '+e.message);
      }
    });
  }

  if(activeTab==='rose') {
    document.getElementById('btn-refresh').onclick = async () => {
      document.getElementById('btn-refresh').textContent='Aggiorno...';
      await loadAll(); paint();
    };
    document.getElementById('btn-export-rose')?.addEventListener('click', () => {
      const data = {
        exported: new Date().toISOString(),
        squadre: teams.map(t => ({
          id: t.id, name: t.name, manager: t.manager,
          rosa: t.rosa||[], puntiTotali: t.puntiTotali||0
        }))
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `rose_sfm_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    });
  }
}

function attachCheckboxEvents(container) {
  container.querySelectorAll('[data-addp]').forEach(el => {
    el.onclick = () => {
      if(el.classList.contains('disabled')) return;
      const p = JSON.parse(el.dataset.addp);
      const mt = myTeam(), rosa = mt.rosa||[];
      const idx = rosa.findIndex(r => r.n===p.n && r.naz===p.naz);
      if(idx>-1) rosa.splice(idx,1);
      else rosa.push(p);
      mt.rosa = rosa;
      // Update checkbox visually immediately
      if(idx>-1) { el.classList.remove('checked'); el.textContent=''; }
      else { el.classList.add('checked'); el.textContent='✓'; }
      // Update quota counters
      const roles=['P','D','C','A'];
      const rn={P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
      document.querySelectorAll('.quota-box').forEach((box,i) => {
        const r=roles[i];
        const cnt=rCount(rosa,r), mn=QUOTA_MIN[r];
        const cls=cnt<mn?'quota-over':'quota-ok';
        const num=box.querySelector('.quota-num');
        if(num){num.textContent=cnt+'/'+mn; num.className='quota-num '+cls;}
      });
      // Update total
      const totalEl = document.getElementById('rosa-total');
      if(totalEl) {
        const totCnt = roles.reduce((a,r)=>a+rCount(rosa,r),0);
        const totTgt = roles.reduce((a,r)=>a+QUOTA_MIN[r],0);
        totalEl.textContent = 'Totale: '+totCnt+'/'+totTgt;
        totalEl.style.color = totCnt>=totTgt?'#1D9E75':'#A32D2D';
      }
      // Turn save button orange = unsaved changes
      const saveBtn = document.getElementById('btn-salva-rosa');
      if(saveBtn) {
        saveBtn.style.background='#e07a10';
        saveBtn.textContent='💾 Salva rosa (modifiche non salvate)';
      }
    };
  });
}
