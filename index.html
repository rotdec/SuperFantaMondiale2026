<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FantaMondiale">
<title>⚽ FantaMondiale 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:.5px solid #e0e0d8;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge-pill{font-size:11px;background:#1D9E75;color:#fff;border-radius:20px;padding:2px 9px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.tabs{display:flex;border-bottom:.5px solid #e0e0d8;background:#fff;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 4px 9px;font-size:11px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .15s;white-space:nowrap}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}
.content{flex:1;padding:12px 12px 100px}
.card{background:#fff;border-radius:12px;border:.5px solid #e0e0d8;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-card{background:#f8f8f4;border-radius:10px;border:.5px solid #e0e0d8;padding:10px 12px;cursor:pointer;transition:all .15s}
.team-card:active{transform:scale(.97)}
.team-card.selected{border:1.5px solid #1D9E75;background:#E1F5EE}
.team-name{font-size:13px;font-weight:600}
.team-manager{font-size:11px;color:#888;margin-top:2px}
.team-count{font-size:11px;color:#1D9E75;margin-top:4px;font-weight:500}
.role-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.role-btn{padding:6px 14px;border-radius:20px;font-size:12px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.role-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.player-item:last-child{border-bottom:none}
.role-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:28px;text-align:center}
.role-P{background:#E6F1FB;color:#185FA5}
.role-D{background:#EAF3DE;color:#3B6D11}
.role-C{background:#FAEEDA;color:#854F0B}
.role-A{background:#FCEBEB;color:#A32D2D}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-nation{font-size:11px;color:#888}
.checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75;color:#fff;font-size:13px}
.checkbox.disabled{opacity:.35;cursor:not-allowed}
.quota-row{display:flex;gap:8px;margin-bottom:12px}
.quota-box{flex:1;background:#f8f8f4;border-radius:8px;padding:8px 4px;text-align:center}
.quota-num{font-size:18px;font-weight:600}
.quota-label{font-size:9px;color:#888;margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.quota-ok{color:#1D9E75}.quota-warn{color:#BA7517}.quota-over{color:#A32D2D}
.field{background:linear-gradient(180deg,#1a6b34 0%,#1a5c2e 100%);border-radius:12px;padding:16px 8px;min-height:300px}
.field-row{display:flex;justify-content:center;gap:4px;margin-bottom:12px}
.player-slot{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:7px 3px;text-align:center;min-width:54px;max-width:70px;flex:1;cursor:pointer;transition:background .15s}
.player-slot:active{background:rgba(255,255,255,.25)}
.player-slot.filled{background:rgba(255,255,255,.2)}
.player-slot.eliminated{opacity:.4;background:rgba(200,40,40,.35)}
.slot-name{font-size:9.5px;color:#fff;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-nation{font-size:8px;color:rgba(255,255,255,.65);margin-top:1px}
.slot-vote{font-size:11px;color:#7adfb0;font-weight:700;margin-top:2px}
.slot-empty{font-size:9px;color:rgba(255,255,255,.4);padding:4px 0}
.module-selector{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mod-btn{padding:5px 11px;font-size:12px;border-radius:20px;border:.5px solid #ccc;background:transparent;cursor:pointer;color:#1a1a1a;font-weight:500}
.mod-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.classifica-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0e8}
.classifica-row:last-child{border-bottom:none}
.pos-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#f0f0e8;color:#888;flex-shrink:0}
.pos-badge.gold{background:#FAEEDA;color:#854F0B}
.pos-badge.silver{background:#f0f0f0;color:#555}
.pos-badge.bronze{background:#fde8d8;color:#854F0B}
.team-pts{font-size:16px;font-weight:700;color:#1D9E75;margin-left:auto}
.btn-primary{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
.btn-primary:active{opacity:.8;transform:scale(.98)}
.btn-secondary{background:transparent;color:#1a1a1a;border:.5px solid #ccc;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:500}
.input-field{width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;margin-bottom:8px;outline:none}
.input-field:focus{border-color:#1D9E75}
.vote-input{width:65px;padding:6px 8px;border-radius:6px;border:.5px solid #ccc;background:#f8f8f4;color:#1a1a1a;font-size:14px;text-align:center;outline:none}
.vote-input:focus{border-color:#1D9E75}
.eliminated-badge{font-size:9px;background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600}
.section-label{font-size:11px;color:#888;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.giornata-selector{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.giornata-selector span{font-size:15px;font-weight:600;flex:1;text-align:center}
.gsel-btn{background:#f0f0e8;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#1a1a1a}
.search-box{width:100%;padding:9px 14px;border-radius:10px;border:.5px solid #e0e0d8;background:#f8f8f4;color:#1a1a1a;font-size:14px;margin-bottom:10px;outline:none}
.search-box:focus{border-color:#1D9E75;background:#fff}
.score-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:.5px solid #e0e0d8}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:75vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{font-size:22px;cursor:pointer;color:#888;padding:4px}
.supabase-status{font-size:11px;padding:6px 10px;border-radius:6px;margin-bottom:8px;display:inline-flex;align-items:center;gap:5px}
.status-ok{background:#E1F5EE;color:#0F6E56}
.status-err{background:#FCEBEB;color:#A32D2D}
.status-loading{background:#f0f0e8;color:#888}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#f0f0f0}
  .topbar,.tabs,.card{background:#2a2a2a;border-color:#3a3a3a}
  .team-card{background:#333;border-color:#444}
  .team-card.selected{background:#0f3d2a;border-color:#1D9E75}
  .search-box,.input-field{background:#333;border-color:#444;color:#f0f0f0}
  .vote-input{background:#333;border-color:#444;color:#f0f0f0}
  .gsel-btn{background:#333;color:#f0f0f0}
  .mod-btn,.role-btn,.btn-secondary{color:#f0f0f0;border-color:#444}
  .modal-sheet{background:#2a2a2a}
  .quota-box{background:#333}
  .player-item{border-color:#3a3a3a}
  .classifica-row{border-color:#3a3a3a}
  .score-total{border-color:#3a3a3a}
}
</style>
</head>

async function sbGet(table, filters={}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}?`;
  Object.entries(filters).forEach(([k,v]) => url += `${k}=eq.${encodeURIComponent(v)}&`);
  url += 'select=*';
  const r = await fetch(url, {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
  return r.json();
}
async function sbUpsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body: JSON.stringify(data)
  });
  return r.ok;
}
async function sbDelete(table, filters={}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}?`;
  Object.entries(filters).forEach(([k,v]) => url += `${k}=eq.${encodeURIComponent(v)}&`);
  return fetch(url, {method:'DELETE', headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
}

async function syncFromSupabase() {
  if(!useSupabase) return;
  try {
    const [votiRows, elimRows] = await Promise.all([
      sbGet('voti'),
      sbGet('nazioni_eliminate')
    ]);
    if(Array.isArray(votiRows)) {
      votiRows.forEach(row => {
        if(!state.voti[row.giornata]) state.voti[row.giornata]={};
        state.voti[row.giornata][row.player_key] = row.voto;
      });
    }
    if(Array.isArray(elimRows)) {
      state.eliminatedNations = elimRows.map(r=>r.naz);
    }
    save();
  } catch(e){}
}

async function pushVotiToSupabase(giornata) {
  if(!useSupabase) return;
  const rows = Object.entries(state.voti[giornata]||{}).map(([player_key,voto])=>({giornata,player_key,voto}));
  await sbUpsert('voti', rows);
}

async function syncEliminateToSupabase() {
  if(!useSupabase) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/nazioni_eliminate`, {method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'}});
    if(state.eliminatedNations.length>0) {
      await sbUpsert('nazioni_eliminate', state.eliminatedNations.map(naz=>({naz})));
    }
  } catch(e){}
}

function renderDraft() {
  if(state.myTeam===null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra nel tab Squadre</div>`;
  const mt=getMyTeam(), rosa=mt.rosa;
  const roles=['P','D','C','A'], rn={P:'Portieri',D:'Difensori',C:'Centrocampisti',A:'Attaccanti'};
  const ar=state._draftRole||'P', sr=state._draftSearch||'';
  let html=`<div class="card"><div class="quota-row">`;
  roles.forEach(r=>{
    const c=rosaCount(rosa,r),m=QUOTA[r];
    const cls=c===m?'quota-ok':c>m?'quota-over':'quota-warn';
    html+=`<div class="quota-box"><div class="quota-num ${cls}">${c}/${m}</div><div class="quota-label">${rn[r]}</div></div>`;
  });
  html+=`</div></div><div class="card"><div class="card-title">Scegli i tuoi giocatori</div><div class="role-tabs">`;
  roles.forEach(r=>html+=`<button class="role-btn ${ar===r?'active':''}" data-drole="${r}">${rn[r]} ${rosaCount(rosa,r)}/${QUOTA[r]}</button>`);
  html+=`</div><input class="search-box" id="draft-search" placeholder="🔍 Cerca giocatore o nazione..." value="${sr}">`;
  let players=[];
  SQUADRE_MONDIALI.forEach(s=>s.g.filter(p=>p.r===ar).forEach(p=>players.push({...p,naz:s.naz,flag:s.flag})));
  if(sr) players=players.filter(p=>p.n.toLowerCase().includes(sr.toLowerCase())||p.naz.toLowerCase().includes(sr.toLowerCase()));
  players.sort((a,b)=>a.n.localeCompare(b.n));
  const canAdd=rosaCount(rosa,ar)<QUOTA[ar];
  players.forEach(p=>{
    const has=rosa.some(r=>r.n===p.n&&r.naz===p.naz);
    const elim=isEliminated(p.naz);
    html+=`<div class="player-item">
      <div class="checkbox ${has?'checked':!canAdd&&!has?'disabled':''}" data-addp="${p.n}" data-addnaz="${p.naz}" data-addr="${p.r}">${has?'✓':''}</div>
      <span class="role-badge role-${p.r}">${p.r}</span>
      <div class="player-info">
        <div class="player-name">${p.n}</div>
        <div class="player-nation">${p.flag} ${p.naz}${elim?'<span class="eliminated-badge">ELIM</span>':''}</div>
      </div></div>`;
  });
  return html+'</div>';
}

function renderFormazione() {
  if(state.myTeam===null) return `<div style="padding:40px;text-align:center;color:#888">Prima seleziona la tua squadra</div>`;
  const mt=getMyTeam(),gk=state.giornata,keyF=`${state.myTeam}_${gk}`,form=state.formazioni[keyF]||{};
  const mod=state.modulo||"4-3-3",parts=mod.split('-').map(Number),nD=parts[0],nC=parts[1],nA=parts[2];
  const votiG=state.voti[gk]||{};
  const getV=p=>p?(votiG[p.n+'_'+p.naz]??null):null;
  const slotP=form.P||null;
  const slotsD=(form.D||[]).slice(0,nD).concat(Array(Math.max(0,nD-(form.D||[]).length)).fill(null));
  const slotsC=(form.C||[]).slice(0,nC).concat(Array(Math.max(0,nC-(form.C||[]).length)).fill(null));
  const slotsA=(form.A||[]).slice(0,nA).concat(Array(Math.max(0,nA-(form.A||[]).length)).fill(null));
  const mkSlot=(p,idx,r)=>{
    const v=getV(p),elim=p&&isEliminated(p.naz);
    return `<div class="player-slot ${p?'filled':''} ${elim?'eliminated':''}" data-fslot="${r}" data-idx="${idx}">
      ${p?`<div class="slot-name">${p.n.split(' ').pop()}</div><div class="slot-nation">${p.flag||getFlag(p.naz)}</div><div class="slot-vote">${v!==null?v:'?'}</div>`:`<div class="slot-empty">+${r}</div>`}
    </div>`;
  };
  let tot=0;
  [slotP,...slotsD,...slotsC,...slotsA].forEach(p=>{if(p&&!isEliminated(p.naz)){const v=getV(p);if(v!==null)tot+=parseFloat(v);}});
  let html=`<div class="card">
    <div class="giornata-selector"><button class="gsel-btn" id="gk-prev">◀</button><span>Giornata ${gk}</span><button class="gsel-btn" id="gk-next">▶</button></div>
    <div class="module-selector">`;
  MODULI.forEach(m=>html+=`<button class="mod-btn ${mod===m?'active':''}" data-mod="${m}">${m}</button>`);
  html+=`</div><div style="font-size:11px;color:#888;margin-bottom:8px">Tocca uno slot per assegnare un giocatore</div>
    <div class="field">
      <div class="field-row">${mkSlot(slotP,0,'P')}</div>
      <div class="field-row">${slotsD.map((p,i)=>mkSlot(p,i,'D')).join('')}</div>
      <div class="field-row">${slotsC.map((p,i)=>mkSlot(p,i,'C')).join('')}</div>
      <div class="field-row">${slotsA.map((p,i)=>mkSlot(p,i,'A')).join('')}</div>
    </div>
    <div class="score-total"><span style="font-size:13px;color:#888">Punteggio G${gk}</span><span style="font-size:20px;font-weight:700;color:#1D9E75">${tot.toFixed(1)} pt</span></div>
  </div>`;
  return html;
}

    </div>`;
  });
  inner+=`</div></div>`;
  const div=document.createElement('div'); div.id='modal-container'; div.innerHTML=inner;

  div.querySelector('#close-modal').onclick=()=>div.remove();

    btn.onclick=()=>{

      const gk=state.giornata, key=`${state.myTeam}_${gk}`;

      if(ri==='P') state.formazioni[key].P=p;
      else {
        const np=state.modulo.split('-').map(Number);
        const ns=ri==='D'?np[0]:ri==='C'?np[1]:np[2];
        const arr=(state.formazioni[key][ri]||[]).slice(0,ns);
        while(arr.length<ns) arr.push(null);
        arr[i]=p; state.formazioni[key][ri]=arr;
      }
      save(); div.remove(); renderTab('formazione');
    };
  });
}

    html+=`<div class="section-label">${s.flag} ${s.naz}</div>`;
    s.g.forEach(p=>{
      const key=p.n+'_'+s.naz, val=votiG[key]!==undefined?votiG[key]:'';
      html+=`<div class="player-item">
        <span class="role-badge role-${p.r}">${p.r}</span>
        <div class="player-info"><div class="player-name">${p.n}</div></div>
        <input class="vote-input" data-vkey="${key}" value="${val}" placeholder="6" type="number" step=".5" min="0" max="10">
      </div>`;
    });
  });
  html+=`<button class="btn-primary" id="save-voti-btn">✅ Salva voti e calcola punteggi</button></div>`;
  return html;
}

function calcAndSave(gk) {
  state.teams.forEach(t=>{
    const key=`${t.id}_${gk}`,form=state.formazioni[key]||{},mod=state.modulo||"4-3-3";
    const np=mod.split('-').map(Number);
    const sD=(form.D||[]).slice(0,np[0]),sC=(form.C||[]).slice(0,np[1]),sA=(form.A||[]).slice(0,np[2]);
    let tot=0;
    [form.P,...sD,...sC,...sA].forEach(p=>{if(p&&!isEliminated(p.naz)){const v=state.voti[gk]?.[p.n+'_'+p.naz];if(v!==undefined)tot+=parseFloat(v);}});
    if(!t.puntiGiornate) t.puntiGiornate=[];
    t.puntiGiornate[gk-1]=Math.round(tot*10)/10;
    t.puntiTotali=Math.round(t.puntiGiornate.reduce((a,b)=>a+(b||0),0)*10)/10;
  });
}

function renderClassifica() {
  const sorted=[...state.teams].sort((a,b)=>b.puntiTotali-a.puntiTotali);
  let html=`<div class="card"><div class="card-title">🏆 Classifica generale</div>`;
  sorted.forEach((t,i)=>{
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    html+=`<div class="classifica-row">
      <div class="pos-badge ${pc}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${t.id===state.myTeam?'👑 ':''}${t.name}</div><div style="font-size:11px;color:#888">${t.manager} · ${t.rosa.length} giocatori</div></div>
      <div style="text-align:right"><div class="team-pts">${t.puntiTotali.toFixed(1)}</div><div style="font-size:10px;color:#888">punti</div></div>
    </div>`;
  });
  html+=`</div>`;
  if(state.giornata>1){
    html+=`<div class="card"><div class="card-title">Andamento giornate</div>`;
    state.teams.forEach(t=>{
      html+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:#888"><span>${t.name}</span><span style="font-weight:600;color:#1D9E75">${t.puntiTotali.toFixed(1)} tot</span></div><div style="display:flex;gap:3px">`;
      for(let g=1;g<state.giornata;g++){
        const pts=t.puntiGiornate[g-1]||0;
        html+=`<div style="flex:1;height:28px;border-radius:5px;background:${pts>0?'#E1F5EE':'#f0f0e8'};border:.5px solid ${pts>0?'#1D9E75':'#e0e0d8'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:${pts>0?'#1D9E75':'#ccc'}">${pts>0?pts.toFixed(0):'G'+g}</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function attachEvents(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); renderTab(t.dataset.tab);
  }));
  if(tab==='squadre'){
    document.querySelectorAll('.team-card').forEach(el=>el.addEventListener('click',()=>{state.myTeam=parseInt(el.dataset.tid);save();render();}));
    document.getElementById('save-team-btn')?.addEventListener('click',()=>{
      const mt=getMyTeam();
      mt.name=document.getElementById('edit-name').value||mt.name;
      mt.manager=document.getElementById('edit-manager').value||mt.manager;
      save();render();
    });
    document.querySelectorAll('[data-elim]').forEach(el=>el.addEventListener('click',()=>{
      const naz=el.dataset.elim, idx=state.eliminatedNations.indexOf(naz);
      if(idx>-1) state.eliminatedNations.splice(idx,1); else state.eliminatedNations.push(naz);
      save(); syncEliminateToSupabase(); renderTab('squadre');
    }));
    document.getElementById('export-btn')?.addEventListener('click',()=>{
      const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`fantamondiale_${Date.now()}.json`; a.click();
    });
    document.getElementById('import-btn')?.addEventListener('click',()=>document.getElementById('import-file').click());
    document.getElementById('import-file')?.addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f) return;
      new FileReader().onload=ev=>{try{state=JSON.parse(ev.target.result);save();render();alert('Dati importati!');}catch(e){alert('File non valido');}}; (new FileReader()).readAsText(f);
    });
    document.getElementById('sync-btn')?.addEventListener('click',async()=>{
      await syncFromSupabase(); save(); render(); alert('Sincronizzato da Supabase!');
    });
  }
  if(tab==='draft'){
    document.querySelectorAll('[data-drole]').forEach(el=>el.addEventListener('click',()=>{state._draftRole=el.dataset.drole;state._draftSearch='';renderTab('draft');}));
    document.getElementById('draft-search')?.addEventListener('input',e=>{
      state._draftSearch=e.target.value;
      saveLocal();
      // Only re-render the player list, not the whole tab
      const sr=state._draftSearch, ar=state._draftRole||'P';
      const mt=getMyTeam(); if(!mt) return;
      const rosa=mt.rosa||[];
      const canAdd=rosaCount(rosa,ar)<QUOTA[ar];
      let players=[];
      SQUADRE_MONDIALI.forEach(s=>s.g.filter(p=>p.r===ar).forEach(p=>players.push({...p,naz:s.naz,flag:s.flag})));
      if(sr) players=players.filter(p=>p.n.toLowerCase().includes(sr.toLowerCase())||p.naz.toLowerCase().includes(sr.toLowerCase()));
      players.sort((a,b)=>a.n.localeCompare(b.n));
      let html='';
      players.forEach(p=>{
        const has=rosa.some(r=>r.n===p.n&&r.naz===p.naz);
        const elim=isEliminated(p.naz);
        html+=`<div class="player-item">
          <div class="checkbox ${has?'checked':!canAdd&&!has?'disabled':''}" data-addp='${JSON.stringify({n:p.n,naz:p.naz,r:p.r,flag:p.flag})}'>${has?'✓':''}</div>
          <span class="role-badge role-${p.r}">${p.r}</span>
          <div class="player-info">
            <div class="player-name">${p.n}</div>
            <div class="player-nation">${p.flag} ${p.naz}${elim?'<span class="eliminated-badge">ELIM</span>':''}</div>
          </div></div>`;
      });
      // Find player list container and update only that
      const existing = document.querySelectorAll('#content .player-item');
      if(existing.length>0){
        const parent=existing[0].parentElement;
        // Remove all player items
        existing.forEach(el=>el.remove());
        // Add new ones
        const tmp=document.createElement('div');
        tmp.innerHTML=html;
        while(tmp.firstChild) parent.appendChild(tmp.firstChild);
        // Re-attach click events to new checkboxes
        parent.querySelectorAll('[data-addp]').forEach(el=>el.addEventListener('click',async()=>{
          if(el.classList.contains('disabled')) return;
          el.style.opacity='0.4'; el.style.pointerEvents='none';
          const p=JSON.parse(el.dataset.addp);
          const mt=getMyTeam(), rosa=mt.rosa||[];
          const idx=rosa.findIndex(r=>r.n===p.n&&r.naz===p.naz);
          if(idx>-1) rosa.splice(idx,1);
          else if(rosaCount(rosa,p.r)<QUOTA[p.r]) rosa.push(p);
          mt.rosa=rosa;
          try { await saveTeam(mt); renderTab('draft'); }
          catch(e){ el.style.opacity=''; el.style.pointerEvents=''; alert('Errore: '+e.message); }
        }));
      }
    });
    document.querySelectorAll('[data-addp]').forEach(el=>el.addEventListener('click',()=>{
      if(el.classList.contains('disabled')) return;
      const mt=getMyTeam(),pn=el.dataset.addp,naz=el.dataset.addnaz,r=el.dataset.addr;
      const idx=mt.rosa.findIndex(p=>p.n===pn&&p.naz===naz);
      const squad=SQUADRE_MONDIALI.find(s=>s.naz===naz);
      if(idx>-1) mt.rosa.splice(idx,1);
      else if(rosaCount(mt.rosa,r)<QUOTA[r]) mt.rosa.push({n:pn,naz,r,flag:squad?.flag});
      save(); renderTab('draft');
    }));
  }
  if(tab==='formazione'){
    document.getElementById('gk-prev')?.addEventListener('click',()=>{if(state.giornata>1){state.giornata--;save();renderTab('formazione');}});
    document.getElementById('gk-next')?.addEventListener('click',()=>{state.giornata++;save();renderTab('formazione');});
    document.querySelectorAll('[data-mod]').forEach(el=>el.addEventListener('click',()=>{state.modulo=el.dataset.mod;save();renderTab('formazione');}));
    document.querySelectorAll('[data-fslot]').forEach(el=>el.addEventListener('click',()=>openSlotPicker(el.dataset.fslot,parseInt(el.dataset.idx))));
  }
  if(tab==='voti'){
    document.getElementById('gk-prev2')?.addEventListener('click',()=>{if(state.giornata>1){state.giornata--;save();renderTab('voti');}});
    document.getElementById('gk-next2')?.addEventListener('click',()=>{state.giornata++;save();renderTab('voti');});
    document.getElementById('save-voti-btn')?.addEventListener('click',async()=>{
      const gk=state.giornata;
      if(!state.voti[gk]) state.voti[gk]={};
      document.querySelectorAll('[data-vkey]').forEach(inp=>{
        const v=parseFloat(inp.value);
        if(!isNaN(v)) state.voti[gk][inp.dataset.vkey]=v;
        else if(inp.value==='') delete state.voti[gk][inp.dataset.vkey];
      });
      calcAndSave(gk);
      save();
      if(useSupabase){ await pushVotiToSupabase(gk); alert(`✅ Voti G${gk} salvati e sincronizzati!`); }
      else { alert(`✅ Voti G${gk} salvati (solo locali — configura Supabase per condividerli)`); }
      renderTab('voti');
    });
  }
}

// Avvio
if(useSupabase) syncFromSupabase().then(()=>render()); else render();
</script>

</html>
